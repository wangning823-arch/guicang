<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤壁之战 · 3D战术俯瞰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: #000; 
    overflow: hidden; 
    font-family: 'Microsoft YaHei', sans-serif;
    color: #fff;
}

#canvas3d {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* 标题栏 */
.title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding-top: 15px;
}

.title-text {
    font-size: 36px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,150,0,0.8), 0 0 60px rgba(255,100,0,0.5);
    letter-spacing: 15px;
    font-family: 'KaiTi', 'SimSun', serif;
}

/* 时间线控制 */
.timeline {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, transparent 100%);
    z-index: 100;
    padding: 20px 40px;
}

.timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.phase-name {
    font-size: 22px;
    color: #ffd700;
    font-weight: bold;
}

.phase-year {
    font-size: 16px;
    color: #aaa;
}

.controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

.btn {
    background: rgba(255,215,0,0.2);
    border: 1px solid #ffd700;
    color: #ffd700;
    padding: 8px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
}

.btn:hover {
    background: rgba(255,215,0,0.4);
}

.btn.active {
    background: #ffd700;
    color: #000;
}

/* 进度条 */
.progress-container {
    position: relative;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin: 15px 0;
    cursor: pointer;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b00, #ffd700);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s;
}

.progress-markers {
    position: absolute;
    top: -5px;
    left: 0;
    right: 0;
    height: 18px;
    display: flex;
    justify-content: space-between;
}

.marker {
    width: 18px;
    height: 18px;
    background: rgba(255,215,0,0.3);
    border: 2px solid #ffd700;
    border-radius: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    transition: all 0.3s;
}

.marker:hover, .marker.active {
    background: #ffd700;
    box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* 场景标签 */
.scene-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
}

/* 信息面板 */
.info-panel {
    position: fixed;
    left: 30px;
    top: 100px;
    width: 320px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.info-panel h3 {
    color: #ffd700;
    font-size: 18px;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,215,0,0.3);
}

.info-content {
    font-size: 14px;
    line-height: 1.8;
    color: #ddd;
}

.info-content .highlight {
    color: #ff6b00;
    font-weight: bold;
}

.info-content .blue {
    color: #4a9eff;
    font-weight: bold;
}

.info-content .red {
    color: #ff4444;
    font-weight: bold;
}

/* 图例 */
.legend {
    position: fixed;
    right: 30px;
    top: 100px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 15px 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.legend h4 {
    color: #ffd700;
    margin-bottom: 10px;
    font-size: 14px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
    font-size: 13px;
    color: #ccc;
}

.legend-color {
    width: 30px;
    height: 4px;
    border-radius: 2px;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

/* 加载画面 */
.loading {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 1s;
}

.loading h1 {
    font-size: 60px;
    color: #ffd700;
    text-shadow: 0 0 50px rgba(255,150,0,1);
    margin-bottom: 30px;
    font-family: 'KaiTi', serif;
    letter-spacing: 20px;
}

.loading-sub {
    font-size: 20px;
    color: #aaa;
    letter-spacing: 5px;
}

.loading-bar {
    width: 300px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    margin-top: 40px;
    border-radius: 2px;
    overflow: hidden;
}

.loading-progress {
    height: 100%;
    background: linear-gradient(90deg, #ff6b00, #ffd700);
    width: 0%;
    animation: loadProgress 2s forwards;
}

@keyframes loadProgress {
    to { width: 100%; }
}
</style>
</head>
<body>
<!-- 加载画面 -->
<div class="loading" id="loading">
    <h1>赤壁之战</h1>
    <div class="loading-sub">公元208年 · 三国鼎立之始</div>
    <div class="loading-bar">
        <div class="loading-progress"></div>
    </div>
</div>

<!-- 3D画布 -->
<canvas id="canvas3d"></canvas>

<!-- 标题 -->
<div class="title-bar">
    <div class="title-text">赤 壁 之 战</div>
</div>

<!-- 信息面板 -->
<div class="info-panel" id="infoPanel">
    <h3 id="infoTitle">战役概述</h3>
    <div class="info-content" id="infoContent">
        公元208年，曹操率<span class="red">二十余万大军</span>南下，意图一统天下。
        <span class="blue">孙权</span>与<span class="blue">刘备</span>结盟，在赤壁与曹军对峙。
        周瑜采用<span class="highlight">火攻之计</span>，趁东南风起，以火船突入曹军水寨，
        烧毁曹操战船，大败曹军。
    </div>
</div>

<!-- 图例 -->
<div class="legend">
    <h4>图 例</h4>
    <div class="legend-item">
        <div class="legend-color" style="background: linear-gradient(90deg, #ff4444, #ff6600);"></div>
        <span>曹操军行军路线</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background: linear-gradient(90deg, #4488ff, #44aaff);"></div>
        <span>孙刘联军路线</span>
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background: #ff6600; box-shadow: 0 0 10px #ff6600;"></div>
        <span>火势蔓延区域</span>
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background: #66ffcc;"></div>
        <span>东南风方向</span>
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background: #8b4513;"></div>
        <span>连环船阵</span>
    </div>
</div>

<!-- 时间线 -->
<div class="timeline">
    <div class="timeline-header">
        <div class="phase-name" id="phaseName">序幕：曹操南征</div>
        <div class="controls">
            <button class="btn" onclick="prevPhase()">◀ 上一幕</button>
            <button class="btn" id="playBtn" onclick="togglePlay()">▶ 播放</button>
            <button class="btn" onclick="nextPhase()">下一幕 ▶</button>
        </div>
        <div class="phase-year" id="phaseYear">建安十三年 · 公元208年</div>
    </div>
    
    <div class="progress-container" onclick="seekTo(event)">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-markers">
            <div class="marker active" onclick="goToPhase(0)"></div>
            <div class="marker" onclick="goToPhase(1)"></div>
            <div class="marker" onclick="goToPhase(2)"></div>
            <div class="marker" onclick="goToPhase(3)"></div>
            <div class="marker" onclick="goToPhase(4)"></div>
            <div class="marker" onclick="goToPhase(5)"></div>
            <div class="marker" onclick="goToPhase(6)"></div>
        </div>
    </div>
    
    <div class="scene-labels">
        <span>曹操南征</span>
        <span>两军对峙</span>
        <span>连环船阵</span>
        <span>东南风起</span>
        <span>火烧赤壁</span>
        <span>曹操败走</span>
        <span>三国鼎立</span>
    </div>
</div>

<script>
// ========== 全局变量 ==========
const canvas = document.getElementById('canvas3d');
const ctx = canvas.getContext('2d');

let width, height;
let currentPhase = 0;
let phaseProgress = 0;
let isPlaying = false;
let time = 0;

// 长江地形数据
const terrain = {
    riverY: 0.45,
    riverWidth: 0.08,
    northBank: 0.35,
    southBank: 0.55
};

// 场景阶段数据
const phases = [
    {
        name: '序幕：曹操南征',
        year: '建安十三年 · 公元208年',
        info: `<span class="red">曹操</span>率<span class="highlight">二十余万大军</span>（号称八十万）从江陵顺江而下，<br>意图一举消灭孙权、刘备，统一天下。<br><br>曹操大军沿长江北岸东进，战船首尾相连，旌旗蔽日。`,
    },
    {
        name: '两军对峙',
        year: '建安十三年冬',
        info: `<span class="blue">孙刘联军</span>约<span class="highlight">五万人</span>，在赤壁与曹军隔江对峙。<br><br><span class="blue">周瑜</span>率东吴水军驻南岸，<span class="blue">刘备</span>军驻樊口。<br>曹军士兵多为北方人，不习水战，多染疾疫。`,
    },
    {
        name: '庞统献策·连环船阵',
        year: '建安十三年十一月',
        info: `<span class="highlight">庞统</span>向曹操献策：将战船用铁链首尾相连，<br>以解决北方士兵晕船之苦。<br><br><span class="red">曹操</span>采纳，将战船连成一片，<br>看似稳固，实则埋下祸根。`,
    },
    {
        name: '东南风起',
        year: '建安十三年十一月甲子日',
        info: `<span class="highlight">诸葛亮</span>设坛祭天，借得<span class="highlight">东南风</span>。<br><br>隆冬时节突刮东南风，实为气候异常。<br>周瑜早已观测天象，预知风向变化。<br>东南风将火势引向曹军水寨。`,
    },
    {
        name: '火烧赤壁',
        year: '建安十三年十一月',
        info: `<span class="blue">黄盖</span>率<span class="highlight">火船</span>诈降，趁风突入曹军水寨。<br><br>火船撞入连环船阵，火势借东南风迅速蔓延。<br>曹军战船首尾相连，无法分散，<span class="highlight">火烧连营</span>。<br>岸上营寨亦被引燃，曹军大乱。`,
    },
    {
        name: '曹操败走华容道',
        year: '建安十三年十二月',
        info: `曹操从<span class="highlight">华容道</span>败走，沿途丢盔弃甲。<br><br><span class="blue">关羽</span>念及旧情放走曹操。<br>曹操退回江陵，再回北方，元气大伤。<br>此役奠定了<span class="highlight">三国鼎立</span>的格局。`,
    },
    {
        name: '三国鼎立',
        year: '公元208年 - 220年',
        info: `赤壁之战后：<br><br>• <span class="blue">孙权</span>巩固江东，称帝建吴<br>• <span class="blue">刘备</span>取荆州、益州，建立蜀汉<br>• <span class="red">曹操</span>退回北方，曹丕称帝建魏<br><br><span class="highlight">天下三分，鼎足而立</span>`,
    }
];

// 士兵/船只对象
let soldiers = [];
let fireParticles = [];
let windParticles = [];
let ships = [];
let fireTrails = [];

// ========== 初始化 ==========
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

// 初始化粒子系统
function initParticles() {
    fireParticles = [];
    windParticles = [];
    fireTrails = [];
    
    // 风向粒子
    for (let i = 0; i < 80; i++) {
        windParticles.push({
            x: Math.random() * width,
            y: height * 0.3 + Math.random() * height * 0.3,
            vx: 2 + Math.random() * 3,
            vy: -0.5 + Math.random(),
            size: 2 + Math.random() * 3,
            alpha: 0.3 + Math.random() * 0.5
        });
    }
}

initParticles();

// ========== 绘制函数 ==========

// 绘制天空渐变
function drawSky() {
    const phaseColors = [
        ['#1a1a2e', '#16213e', '#0f3460'],  // 夜晚/黎明
        ['#2c3e50', '#3498db', '#85c1e9'],  // 白天
        ['#2c3e50', '#34495e', '#5d6d7e'],  // 阴天
        ['#1a1a2e', '#0f3460', '#533483'],  // 夜晚神秘
        ['#ff6b35', '#ff4500', '#8b0000'],  // 火焰
        ['#2c3e50', '#34495e', '#1a1a2e'],  // 傍晚
        ['#1a1a2e', '#16213e', '#0f3460'],  // 夜晚
    ];
    
    const colors = phaseColors[currentPhase];
    const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.5);
    gradient.addColorStop(0, colors[0]);
    gradient.addColorStop(0.5, colors[1]);
    gradient.addColorStop(1, colors[2]);
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
}

// 绘制长江水面
function drawRiver() {
    const riverTop = height * 0.38;
    const riverBottom = height * 0.58;
    
    // 水面基础
    const waterGradient = ctx.createLinearGradient(0, riverTop, 0, riverBottom);
    
    if (currentPhase >= 4) {
        // 火焰映照下的水面
        waterGradient.addColorStop(0, 'rgba(139,69,19,0.8)');
        waterGradient.addColorStop(0.5, 'rgba(100,50,20,0.9)');
        waterGradient.addColorStop(1, 'rgba(50,25,10,0.8)');
    } else {
        waterGradient.addColorStop(0, '#1a3a5c');
        waterGradient.addColorStop(0.3, '#1e4d6b');
        waterGradient.addColorStop(0.7, '#2a5f7a');
        waterGradient.addColorStop(1, '#1a3a5c');
    }
    
    ctx.fillStyle = waterGradient;
    ctx.fillRect(0, riverTop, width, riverBottom - riverTop);
    
    // 水面波纹
    ctx.strokeStyle = currentPhase >= 4 ? 'rgba(255,100,0,0.3)' : 'rgba(100,200,255,0.2)';
    ctx.lineWidth = 1;
    
    for (let i = 0; i < 15; i++) {
        ctx.beginPath();
        const y = riverTop + (riverBottom - riverTop) * (i / 15);
        ctx.moveTo(0, y);
        
        for (let x = 0; x < width; x += 20) {
            const wave = Math.sin((x + time * 50) / 100) * 3;
            ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
    }
}

// 绘制两岸地形
function drawBanks() {
    // 北岸（曹操军）
    const northGradient = ctx.createLinearGradient(0, height * 0.2, 0, height * 0.38);
    northGradient.addColorStop(0, '#2d4a3e');
    northGradient.addColorStop(1, '#3d5a4e');
    
    ctx.fillStyle = northGradient;
    ctx.beginPath();
    ctx.moveTo(0, height * 0.38);
    
    // 北岸山丘轮廓
    for (let x = 0; x <= width; x += 50) {
        const hillHeight = 30 * Math.sin(x / 300) + 20 * Math.cos(x / 200);
        ctx.lineTo(x, height * 0.38 - Math.abs(hillHeight) - 10);
    }
    ctx.lineTo(width, 0);
    ctx.lineTo(0, 0);
    ctx.closePath();
    ctx.fill();
    
    // 南岸（孙刘联军）
    const southGradient = ctx.createLinearGradient(0, height * 0.58, 0, height * 0.75);
    southGradient.addColorStop(0, '#3d5a4e');
    southGradient.addColorStop(1, '#2d4a3e');
    
    ctx.fillStyle = southGradient;
    ctx.beginPath();
    ctx.moveTo(0, height * 0.58);
    
    for (let x = 0; x <= width; x += 50) {
        const hillHeight = 25 * Math.sin(x / 250 + 1) + 15 * Math.cos(x / 180);
        ctx.lineTo(x, height * 0.58 + Math.abs(hillHeight) + 10);
    }
    ctx.lineTo(width, height);
    ctx.lineTo(0, height);
    ctx.closePath();
    ctx.fill();
    
    // 赤壁标注
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 16px KaiTi, serif';
    ctx.textAlign = 'center';
    ctx.fillText('赤 壁', width * 0.65, height * 0.35);
    
    // 乌林标注
    ctx.fillText('乌 林', width * 0.65, height * 0.63);
}

// 绘制行军路线
function drawMarchRoutes() {
    const routeProgress = Math.min(1, phaseProgress * 2);
    
    // 曹操军路线（红色）- 从北岸
    if (currentPhase >= 0) {
        ctx.strokeStyle = 'rgba(255,68,68,0.8)';
        ctx.lineWidth = 4;
        ctx.setLineDash([10, 5]);
        
        ctx.beginPath();
        const startX = -50;
        const endX = width * 0.7 * routeProgress;
        ctx.moveTo(startX, height * 0.33);
        
        for (let x = startX; x <= endX; x += 5) {
            const y = height * 0.33 + 10 * Math.sin(x / 150);
            ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        // 路径箭头
        if (routeProgress > 0.3) {
            drawArrow(endX - 20, height * 0.33, endX + 20, height * 0.33, '#ff4444');
        }
    }
    
    // 孙刘联军路线（蓝色）
    if (currentPhase >= 1) {
        ctx.strokeStyle = 'rgba(68,136,255,0.8)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 4]);
        
        ctx.beginPath();
        ctx.moveTo(width * 0.3, height * 0.7);
        ctx.lineTo(width * 0.55 * routeProgress + width * 0.3, height * 0.62);
        ctx.stroke();
        
        // 樊口标注
        ctx.fillStyle = '#4a9eff';
        ctx.font = '14px KaiTi, serif';
        ctx.fillText('樊口', width * 0.32, height * 0.73);
    }
    
    ctx.setLineDash([]);
}

// 绘制曹军水寨和连环船
function drawCaoCamp() {
    if (currentPhase < 0) return;
    
    const campX = width * 0.55;
    const campY = height * 0.41;
    
    // 水寨标记
    ctx.strokeStyle = 'rgba(255,68,68,0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(campX - 80, campY - 20, 200, 35);
    
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px KaiTi, serif';
    ctx.textAlign = 'center';
    ctx.fillText('曹军水寨', campX + 20, campY - 28);
    
    // 连环船（阶段2开始显示）
    if (currentPhase >= 2) {
        drawLinkedShips(campX, campY);
    }
}

// 绘制连环船阵
function drawLinkedShips(baseX, baseY) {
    const shipCount = 8;
    const shipWidth = 25;
    const shipHeight = 12;
    const linkProgress = Math.min(1, (currentPhase === 2 ? phaseProgress : 1));
    
    for (let i = 0; i < shipCount * linkProgress; i++) {
        const x = baseX - 70 + i * 22;
        const y = baseY;
        
        // 船体
        ctx.fillStyle = currentPhase >= 4 ? '#8b4513' : '#654321';
        ctx.beginPath();
        ctx.ellipse(x, y, shipWidth/2, shipHeight/2, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 船帆
        ctx.fillStyle = currentPhase >= 4 ? '#aa3300' : '#ddd';
        ctx.beginPath();
        ctx.moveTo(x, y - 15);
        ctx.lineTo(x + 8, y);
        ctx.lineTo(x - 8, y);
        ctx.closePath();
        ctx.fill();
        
        // 铁链连接
        if (i > 0 && linkProgress > 0.5) {
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - 12, y);
            ctx.lineTo(x - 10, y);
            ctx.stroke();
        }
    }
    
    // 连环船标注
    if (linkProgress > 0.5) {
        ctx.fillStyle = '#8b4513';
        ctx.font = '12px KaiTi, serif';
        ctx.fillText('连 环 船 阵', baseX + 20, baseY + 35);
    }
}

// 绘制孙刘联军
function drawSunLiuCamp() {
    if (currentPhase < 1) return;
    
    const campX = width * 0.35;
    const campY = height * 0.57;
    
    // 南岸营寨
    ctx.strokeStyle = 'rgba(68,136,255,0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(campX - 60, campY - 15, 150, 30);
    
    ctx.fillStyle = '#4a9eff';
    ctx.font = 'bold 14px KaiTi, serif';
    ctx.textAlign = 'center';
    ctx.fillText('孙刘联军', campX + 15, campY - 22);
    
    // 联军船只
    const shipCount = 5;
    for (let i = 0; i < shipCount; i++) {
        const x = campX - 50 + i * 25;
        const y = campY + 5;
        
        ctx.fillStyle = '#4a9eff';
        ctx.beginPath();
        ctx.ellipse(x, y, 12, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x, y - 10);
        ctx.lineTo(x + 5, y);
        ctx.lineTo(x - 5, y);
        ctx.closePath();
        ctx.fill();
    }
}

// 绘制东南风
function drawWind() {
    if (currentPhase < 3) return;
    
    const windIntensity = currentPhase === 3 ? phaseProgress : 1;
    
    // 更新风粒子
    windParticles.forEach(p => {
        p.x += p.vx * windIntensity * 1.5;
        p.y += p.vy * windIntensity;
        
        if (p.x > width + 20) {
            p.x = -20;
            p.y = height * 0.3 + Math.random() * height * 0.3;
        }
        
        // 绘制风粒子
        ctx.beginPath();
        ctx.strokeStyle = `rgba(102,255,204,${p.alpha * windIntensity})`;
        ctx.lineWidth = p.size * 0.5;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.size * 8, p.y + p.size * 2);
        ctx.stroke();
    });
    
    // 风向大箭头
    if (windIntensity > 0.3) {
        const arrowX = width * 0.45;
        const arrowY = height * 0.48;
        
        ctx.save();
        ctx.globalAlpha = windIntensity * 0.6;
        
        // 箭头主体
        ctx.strokeStyle = '#66ffcc';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(arrowX - 60, arrowY + 15);
        ctx.lineTo(arrowX + 40, arrowY - 15);
        ctx.stroke();
        
        // 箭头头部
        ctx.fillStyle = '#66ffcc';
        ctx.beginPath();
        ctx.moveTo(arrowX + 50, arrowY - 20);
        ctx.lineTo(arrowX + 30, arrowY - 10);
        ctx.lineTo(arrowX + 35, arrowY - 25);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
        
        // 东南风标注
        ctx.fillStyle = '#66ffcc';
        ctx.font = 'bold 16px KaiTi, serif';
        ctx.fillText('东 南 风', arrowX - 10, arrowY + 35);
    }
}

// 绘制黄盖火船突入
function drawFireAttack() {
    if (currentPhase < 4) return;
    
    const attackProgress = Math.min(1, phaseProgress * 1.5);
    
    // 火船从南岸出发
    const fireShipX = width * 0.4 + attackProgress * width * 0.18;
    const fireShipY = height * 0.55 - attackProgress * height * 0.12;
    
    // 火船
    ctx.fillStyle = '#ff4500';
    ctx.beginPath();
    ctx.ellipse(fireShipX, fireShipY, 15, 8, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    // 火焰
    for (let i = 0; i < 8; i++) {
        const fx = fireShipX + Math.random() * 20 - 10;
        const fy = fireShipY - 10 - Math.random() * 20;
        const fs = 3 + Math.random() * 5;
        
        const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, fs);
        gradient.addColorStop(0, '#ffff00');
        gradient.addColorStop(0.5, '#ff6600');
        gradient.addColorStop(1, 'rgba(255,0,0,0)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(fx, fy, fs, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // 火船尾迹
    ctx.strokeStyle = 'rgba(255,100,0,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(width * 0.4, height * 0.55);
    ctx.lineTo(fireShipX, fireShipY);
    ctx.stroke();
    
    // 标注
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px KaiTi, serif';
    ctx.fillText('黄盖火船', fireShipX, fireShipY + 25);
}

// 绘制火势蔓延
function drawFireSpread() {
    if (currentPhase < 4) return;
    
    const fireProgress = currentPhase === 4 ? phaseProgress : 1;
    
    // 添加新火焰粒子
    if (fireProgress > 0.3 && Math.random() > 0.5) {
        const baseX = width * 0.58;
        const baseY = height * 0.42;
        
        fireParticles.push({
            x: baseX + (Math.random() - 0.3) * 150 * fireProgress,
            y: baseY + (Math.random() - 0.5) * 40,
            vx: (Math.random() - 0.5) * 2,
            vy: -1 - Math.random() * 3,
            life: 1,
            size: 5 + Math.random() * 15
        });
    }
    
    // 更新和绘制火焰粒子
    fireParticles = fireParticles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        
        if (p.life > 0) {
            const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life);
            gradient.addColorStop(0, `rgba(255,255,0,${p.life})`);
            gradient.addColorStop(0.3, `rgba(255,150,0,${p.life * 0.8})`);
            gradient.addColorStop(1, 'rgba(255,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            
            return true;
        }
        return false;
    });
    
    // 限制粒子数量
    if (fireParticles.length > 200) {
        fireParticles = fireParticles.slice(-200);
    }
    
    // 火势覆盖区域
    if (fireProgress > 0.5) {
        ctx.fillStyle = `rgba(255,100,0,${fireProgress * 0.15})`;
        ctx.beginPath();
        ctx.ellipse(width * 0.6, height * 0.44, 120 * fireProgress, 35 * fireProgress, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // 火势蔓延标注
    if (fireProgress > 0.6) {
        ctx.fillStyle = '#ff6600';
        ctx.font = 'bold 18px KaiTi, serif';
        ctx.textAlign = 'center';
        ctx.fillText('🔥 火烧连营 🔥', width * 0.6, height * 0.48);
    }
}

// 绘制曹操败走
def drawCaoRetreat() {
    if (currentPhase < 5) return;
    
    const retreatProgress = Math.min(1, phaseProgress);
    
    // 华容道路径
    ctx.strokeStyle = 'rgba(255,68,68,0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([5, 5]);
    
    ctx.beginPath();
    ctx.moveTo(width * 0.55, height * 0.38);
    
    const pathPoints = [
        [0.5, 0.35],
        [0.45, 0.32],
        [0.4, 0.28],
        [0.35, 0.25],
        [0.3, 0.22],
        [0.25, 0.2]
    ];
    
    pathPoints.forEach((p, i) => {
        if (i / pathPoints.length < retreatProgress) {
            ctx.lineTo(width * p[0], height * p[1]);
        }
    });
    ctx.stroke();
    ctx.setLineDash([]);
    
    // 曹操败军
    const retreatX = width * (0.55 - retreatProgress * 0.3);
    const retreatY = height * (0.38 - retreatProgress * 0.18);
    
    // 败军图标
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(retreatX, retreatY, 12, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('曹', retreatX, retreatY);
    
    // 败退小兵
    for (let i = 0; i < 5; i++) {
        const dx = retreatX + 15 + i * 12 + Math.random() * 5;
        const dy = retreatY + Math.random() * 10 - 5;
        
        ctx.fillStyle = '#aa3333';
        ctx.beginPath();
        ctx.arc(dx, dy, 4, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // 华容道标注
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px KaiTi, serif';
    ctx.fillText('华容道', width * 0.38, height * 0.27);
    
    // 标注败退
    ctx.fillStyle = '#ff4444';
    ctx.font = '16px KaiTi, serif';
    ctx.fillText('曹操败走', retreatX, retreatY - 25);
}

// 绘制三国鼎立
function drawThreeKingdoms() {
    if (currentPhase < 6) return;
    
    const showProgress = Math.min(1, phaseProgress * 2);
    
    // 魏
    ctx.globalAlpha = showProgress;
    
    ctx.fillStyle = 'rgba(255,68,68,0.3)';
    ctx.beginPath();
    ctx.ellipse(width * 0.5, height * 0.2, 100, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px KaiTi, serif';
    ctx.textAlign = 'center';
    ctx.fillText('魏', width * 0.5, height * 0.2);
    
    ctx.font = '14px KaiTi, serif';
    ctx.fillText('曹操 · 汝阳', width * 0.5, height * 0.2 + 35);
    
    // 蜀
    ctx.fillStyle = 'rgba(68,136,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(width * 0.25, height * 0.75, 80, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#4a9eff';
    ctx.font = 'bold 28px KaiTi, serif';
    ctx.fillText('蜀', width * 0.25, height * 0.75);
    
    ctx.font = '14px KaiTi, serif';
    ctx.fillText('刘备 · 成都', width * 0.25, height * 0.75 + 35);
    
    // 吴
    ctx.fillStyle = 'rgba(0,200,100,0.3)';
    ctx.beginPath();
    ctx.ellipse(width * 0.75, height * 0.75, 80, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#00c864';
    ctx.font = 'bold 28px KaiTi, serif';
    ctx.fillText('吴', width * 0.75, height * 0.75);
    
    ctx.font = '14px KaiTi, serif';
    ctx.fillText('孙权 · 建业', width * 0.75, height * 0.75 + 35);
    
    // 连接线
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    
    ctx.beginPath();
    ctx.moveTo(width * 0.5, height * 0.24);
    ctx.lineTo(width * 0.25, height * 0.71);
    ctx.moveTo(width * 0.5, height * 0.24);
    ctx.lineTo(width * 0.75, height * 0.71);
    ctx.moveTo(width * 0.25, height * 0.71);
    ctx.lineTo(width * 0.75, height * 0.71);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.globalAlpha = 1;
    
    // 鼎立标题
    if (showProgress > 0.5) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 32px KaiTi, serif';
        ctx.fillText('天 下 三 分 · 鼎 足 而 立', width * 0.5, height * 0.5);
    }
}

// 绘制箭头
function drawArrow(x1, y1, x2, y2, color) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLen = 12;
    
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
    ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
    ctx.closePath();
    ctx.fill();
}

// 绘制云层
function drawClouds() {
    ctx.fillStyle = 'rgba(150,150,150,0.1)';
    
    for (let i = 0; i < 8; i++) {
        const x = (i * 200 + time * 10) % (width + 200) - 100;
        const y = 50 + i * 30 + Math.sin(time + i) * 10;
        
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.arc(x + 30, y - 10, 35, 0, Math.PI * 2);
        ctx.arc(x + 60, y, 30, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ========== 主渲染循环 ==========
function render() {
    ctx.clearRect(0, 0, width, height);
    
    // 绘制场景
    drawSky();
    drawClouds();
    drawBanks();
    drawRiver();
    drawMarchRoutes();
    drawCaoCamp();
    drawSunLiuCamp();
    drawWind();
    drawFireAttack();
    drawFireSpread();
    drawCaoRetreat();
    drawThreeKingdoms();
    
    // 更新时间
    time += 0.016;
    
    // 自动播放更新
    if (isPlaying) {
        phaseProgress += 0.003;
        if (phaseProgress >= 1) {
            if (currentPhase < phases.length - 1) {
                currentPhase++;
                phaseProgress = 0;
                updateUI();
            } else {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶ 播放';
            }
        }
        updateProgressBar();
    }
    
    requestAnimationFrame(render);
}

// ========== UI更新 ==========
function updateUI() {
    document.getElementById('phaseName').textContent = phases[currentPhase].name;
    document.getElementById('phaseYear').textContent = phases[currentPhase].year;
    document.getElementById('infoTitle').textContent = phases[currentPhase].name;
    document.getElementById('infoContent').innerHTML = phases[currentPhase].info;
    
    // 更新标记
    document.querySelectorAll('.marker').forEach((m, i) => {
        m.classList.toggle('active', i === currentPhase);
    });
}

function updateProgressBar() {
    const totalProgress = (currentPhase + phaseProgress) / phases.length * 100;
    document.getElementById('progressBar').style.width = totalProgress + '%';
}

function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('playBtn').textContent = isPlaying ? '⏸ 暂停' : '▶ 播放';
}

function prevPhase() {
    if (currentPhase > 0) {
        currentPhase--;
        phaseProgress = 0;
        updateUI();
        updateProgressBar();
    }
}

function nextPhase() {
    if (currentPhase < phases.length - 1) {
        currentPhase++;
        phaseProgress = 0;
        updateUI();
        updateProgressBar();
    }
}

function goToPhase(index) {
    currentPhase = index;
    phaseProgress = 0;
    updateUI();
    updateProgressBar();
}

function seekTo(event) {
    const rect = event.target.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const percent = x / rect.width;
    const phase = Math.floor(percent * phases.length);
    
    if (phase >= 0 && phase < phases.length) {
        goToPhase(phase);
    }
}

// ========== 启动 ==========
setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
    }, 1000);
}, 2200);

render();
</script>
