<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤壁之战 3D 战术演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #ffd700;
            letter-spacing: 4px;
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            max-width: 400px;
            pointer-events: auto;
        }
        #event-text {
            font-size: 16px;
            line-height: 1.5;
            color: #eee;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .control-btn {
            background: rgba(50, 50, 50, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .control-btn:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        #timeline {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            pointer-events: auto;
        }
        #timeline-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff4500);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        #legend {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #wind-indicator {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        #wind-arrow {
            width: 60px;
            height: 60px;
            position: relative;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            text-align: center;
            max-width: 500px;
            pointer-events: auto;
            display: none;
        }
        #instructions h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }
        #instructions p {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        #start-btn {
            background: linear-gradient(135deg, #ffd700, #ff4500);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        #start-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        
        <div id="ui">
            <div id="title">赤壁之战 · 3D 战术演示</div>
            
            <div id="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff4444;"></div>
                    <span>曹操军</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4444ff;"></div>
                    <span>孙刘联军</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff8800;"></div>
                    <span>火船/火攻</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #00ff88;"></div>
                    <span>东南风</span>
                </div>
            </div>
            
            <div id="wind-indicator">
                <div style="margin-bottom: 10px; font-size: 14px;">风向指示</div>
                <div id="wind-arrow">
                    <svg viewBox="0 0 100 100" width="60" height="60">
                        <defs>
                            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
                            </marker>
                        </defs>
                        <line x1="20" y1="80" x2="80" y2="20" stroke="#00ff88" stroke-width="3" marker-end="url(#arrowhead)"/>
                        <text x="50" y="50" text-anchor="middle" fill="#fff" font-size="10" transform="rotate(-45, 50, 50)">东南风</text>
                    </svg>
                </div>
            </div>
            
            <div id="info-panel">
                <div id="event-text">公元208年，曹操率八十万大军南下，意图一统天下。孙权与刘备结成联盟，共抗曹军。</div>
            </div>
            
            <div id="timeline">
                <div id="timeline-progress"></div>
            </div>
            
            <div id="controls">
                <button class="control-btn" id="play-btn">播放</button>
                <button class="control-btn" id="pause-btn">暂停</button>
                <button class="control-btn" id="reset-btn">重置</button>
            </div>
            
            <div id="instructions">
                <h2>赤壁之战 · 3D 战术演示</h2>
                <p>本演示将带您回到公元208年，以3D俯瞰视角重现赤壁之战的完整过程。</p>
                <p>您将看到：长江地形、两军对峙、连环船阵、黄盖火攻、东南风助力、火势蔓延、曹操败走。</p>
                <p>鼠标可拖动旋转视角，滚轮缩放。</p>
                <button id="start-btn">开始演示</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 核心变量
        let scene, camera, renderer, clock;
        let terrain, water;
        let caoArmy, sunLiuArmy;
        let ships = [], fireShips = [];
        let windParticles = [];
        let fireParticles = [];
        let timeline = {
            current: 0,
            duration: 60, // 60秒演示
            events: [
                { time: 0, text: "公元208年，曹操率八十万大军南下，意图一统天下。" },
                { time: 5, text: "孙权与刘备结成联盟，共抗曹军。" },
                { time: 10, text: "两军在赤壁隔江对峙，曹军多为北方人，不习水战。" },
                { time: 15, text: "曹操采纳庞统建议，将战船用铁索相连，以减少颠簸。" },
                { time: 20, text: "连环船阵形成，曹操军水上移动能力大增。" },
                { time: 25, text: "黄盖献计火攻，周瑜同意。黄盖假装投降，率领火船接近曹营。" },
                { time: 30, text: "东南风起，火船借风势冲入曹军船阵。" },
                { time: 35, text: "火船撞上连环船，大火迅速蔓延。" },
                { time: 40, text: "火势顺风蔓延，曹军船队陷入火海。" },
                { time: 45, text: "曹操军大乱，溺死烧死者无数。" },
                { time: 50, text: "曹操从华容道败走，仅剩少数残兵。" },
                { time: 55, text: "赤壁之战奠定三国鼎立格局。" },
                { time: 60, text: "演示结束" }
            ]
        };
        let isPlaying = false;
        let cameraPath = [];
        let pathIndex = 0;

        // 初始化场景
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 100, 300);

            // 相机
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 100, 150);
            camera.lookAt(0, 0, 0);

            // 渲染器
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // 时钟
            clock = new THREE.Clock();

            // 灯光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 500;
            directionalLight.shadow.camera.left = -100;
            directionalLight.shadow.camera.right = 100;
            directionalLight.shadow.camera.top = 100;
            directionalLight.shadow.camera.bottom = -100;
            scene.add(directionalLight);

            // 创建地形
            createTerrain();
            
            // 创建水面
            createWater();
            
            // 创建军队
            createArmies();
            
            // 创建船只
            createShips();
            
            // 创建风向粒子
            createWindParticles();
            
            // 创建相机路径
            createCameraPath();

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.getElementById('start-btn').addEventListener('click', startDemo);
            document.getElementById('play-btn').addEventListener('click', play);
            document.getElementById('pause-btn').addEventListener('click', pause);
            document.getElementById('reset-btn').addEventListener('click', reset);
            document.getElementById('timeline').addEventListener('click', onTimelineClick);

            // 显示说明
            document.getElementById('instructions').style.display = 'block';
        }

        // 创建地形
        function createTerrain() {
            // 使用平面几何体作为基础地形
            const terrainGeometry = new THREE.PlaneGeometry(400, 200, 100, 50);
            terrainGeometry.rotateX(-Math.PI / 2);
            
            // 添加高度变化
            const vertices = terrainGeometry.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                const x = vertices[i];
                const z = vertices[i + 2];
                
                // 创建两岸地形
                if (z > 20) {
                    // 北岸（曹操）
                    vertices[i + 1] = Math.sin(x * 0.05) * 3 + Math.cos(z * 0.1) * 2;
                } else if (z < -20) {
                    // 南岸（孙刘）
                    vertices[i + 1] = Math.sin(x * 0.04) * 4 + Math.cos(z * 0.08) * 3;
                } else {
                    // 河床
                    vertices[i + 1] = -5 + Math.sin(x * 0.1) * 1;
                }
            }
            terrainGeometry.computeVertexNormals();
            
            const terrainMaterial = new THREE.MeshStandardMaterial({
                color: 0x3d5c35,
                roughness: 0.8,
                metalness: 0.1,
                flatShading: true
            });
            
            terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
            terrain.receiveShadow = true;
            scene.add(terrain);
            
            // 添加树木（简化表示）
            createTrees();
        }

        // 创建树木
        function createTrees() {
            const treeGeometry = new THREE.ConeGeometry(2, 5, 6);
            const treeMaterial = new THREE.MeshStandardMaterial({ color: 0x2d4a22 });
            const trunkGeometry = new THREE.CylinderGeometry(0.3, 0.5, 2, 6);
            const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x5c3a1e });
            
            // 北岸树木
            for (let i = 0; i < 30; i++) {
                const x = Math.random() * 300 - 150;
                const z = 40 + Math.random() * 40;
                
                const tree = new THREE.Group();
                
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = 1;
                tree.add(trunk);
                
                const crown = new THREE.Mesh(treeGeometry, treeMaterial);
                crown.position.y = 4;
                tree.add(crown);
                
                tree.position.set(x, 0, z);
                tree.castShadow = true;
                scene.add(tree);
            }
            
            // 南岸树木
            for (let i = 0; i < 25; i++) {
                const x = Math.random() * 300 - 150;
                const z = -40 - Math.random() * 40;
                
                const tree = new THREE.Group();
                
                const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
                trunk.position.y = 1;
                tree.add(trunk);
                
                const crown = new THREE.Mesh(treeGeometry, treeMaterial);
                crown.position.y = 4;
                tree.add(crown);
                
                tree.position.set(x, 0, z);
                tree.castShadow = true;
                scene.add(tree);
            }
        }

        // 创建水面
        function createWater() {
            const waterGeometry = new THREE.PlaneGeometry(400, 40, 50, 20);
            waterGeometry.rotateX(-Math.PI / 2);
            
            const waterMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a3c5c,
                roughness: 0.2,
                metalness: 0.3,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });
            
            water = new THREE.Mesh(waterGeometry, waterMaterial);
            water.position.y = -2;
            water.receiveShadow = true;
            scene.add(water);
            
            // 添加水波纹
            const waterVertices = waterGeometry.attributes.position.array;
            for (let i = 0; i < waterVertices.length; i += 3) {
                waterVertices[i + 1] = Math.sin(waterVertices[i] * 0.1) * 0.5;
            }
            waterGeometry.computeVertexNormals();
        }

        // 创建军队
        function createArmies() {
            // 曹操军（北岸）
            caoArmy = createArmy(0xff4444, 100);
            caoArmy.position.set(0, 2, 50);
            scene.add(caoArmy);
            
            // 孙刘联军（南岸）
            sunLiuArmy = createArmy(0x4444ff, 60);
            sunLiuArmy.position.set(-50, 2, -50);
            scene.add(sunLiuArmy);
        }

        // 创建军队
        function createArmy(color, count) {
            const army = new THREE.Group();
            const soldierGeometry = new THREE.BoxGeometry(0.5, 1, 0.5);
            const soldierMaterial = new THREE.MeshStandardMaterial({ color: color });
            
            for (let i = 0; i < count; i++) {
                const soldier = new THREE.Mesh(soldierGeometry, soldierMaterial);
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 30;
                soldier.position.set(x, 0.5, z);
                soldier.castShadow = true;
                army.add(soldier);
            }
            
            return army;
        }

        // 创建船只
        function createShips() {
            // 曹操军船只（连环船）
            for (let i = 0; i < 8; i++) {
                const ship = createShip(0x8b4513, 15, 5);
                ship.position.set(-30 + i * 10, -1, 10);
                ship.userData.originalPosition = ship.position.clone();
                ships.push(ship);
                scene.add(ship);
            }
            
            // 孙刘联军船只
            for (let i = 0; i < 5; i++) {
                const ship = createShip(0x4169e1, 10, 4);
                ship.position.set(-40 + i * 8, -1, -15);
                ship.userData.originalPosition = ship.position.clone();
                scene.add(ship);
            }
            
            // 火船（黄盖）
            for (let i = 0; i < 3; i++) {
                const fireShip = createFireShip();
                fireShip.position.set(-60, -1, -20);
                fireShip.userData.originalPosition = fireShip.position.clone();
                fireShips.push(fireShip);
                scene.add(fireShip);
            }
        }

        // 创建船只
        function createShip(color, length, width) {
            const shipGroup = new THREE.Group();
            
            // 船体
            const hullGeometry = new THREE.BoxGeometry(length, 2, width);
            const hullMaterial = new THREE.MeshStandardMaterial({ color: color });
            const hull = new THREE.Mesh(hullGeometry, hullMaterial);
            hull.position.y = 1;
            hull.castShadow = true;
            shipGroup.add(hull);
            
            // 桅杆
            const mastGeometry = new THREE.CylinderGeometry(0.2, 0.2, 8, 8);
            const mastMaterial = new THREE.MeshStandardMaterial({ color: 0x5c3a1e });
            const mast = new THREE.Mesh(mastGeometry, mastMaterial);
            mast.position.set(0, 5, 0);
            mast.castShadow = true;
            shipGroup.add(mast);
            
            // 帆
            const sailGeometry = new THREE.PlaneGeometry(6, 4);
            const sailMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8
            });
            const sail = new THREE.Mesh(sailGeometry, sailMaterial);
            sail.position.set(0, 6, 0);
            shipGroup.add(sail);
            
            return shipGroup;
        }

        // 创建火船
        function createFireShip() {
            const fireShipGroup = new THREE.Group();
            
            // 船体
            const hullGeometry = new THREE.BoxGeometry(12, 2, 4);
            const hullMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const hull = new THREE.Mesh(hullGeometry, hullMaterial);
            hull.position.y = 1;
            hull.castShadow = true;
            fireShipGroup.add(hull);
            
            // 易燃物
            const fuelGeometry = new THREE.BoxGeometry(10, 1.5, 3);
            const fuelMaterial = new THREE.MeshStandardMaterial({ color: 0x654321 });
            const fuel = new THREE.Mesh(fuelGeometry, fuelMaterial);
            fuel.position.y = 2.5;
            fireShipGroup.add(fuel);
            
            // 火焰（初始隐藏）
            const fireGeometry = new THREE.ConeGeometry(3, 4, 8);
            const fireMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xff4500,
                transparent: true,
                opacity: 0.8
            });
            const fire = new THREE.Mesh(fireGeometry, fireMaterial);
            fire.position.y = 5;
            fire.visible = false;
            fireShipGroup.add(fire);
            fireShipGroup.userData.fire = fire;
            
            return fireShipGroup;
        }

        // 创建风向粒子
        function createWindParticles() {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                // 初始位置：东南方向
                positions[i * 3] = Math.random() * 100 - 50;
                positions[i * 3 + 1] = Math.random() * 20 + 5;
                positions[i * 3 + 2] = Math.random() * 50 - 75;
                
                // 速度：西北方向（东南风）
                velocities[i * 3] = -0.2 + Math.random() * 0.1;
                velocities[i * 3 + 1] = 0;
                velocities[i * 3 + 2] = 0.3 + Math.random() * 0.1;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x00ff88,
                size: 0.5,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            particles.visible = false; // 初始隐藏，火攻时显示
            scene.add(particles);
            windParticles.push(particles);
        }

        // 创建相机路径
        function createCameraPath() {
            // 定义关键点
            const points = [
                new THREE.Vector3(0, 100, 150),    // 初始概览
                new THREE.Vector3(0, 80, 100),     // 长江全景
                new THREE.Vector3(-30, 60, 50),    // 曹操军营
                new THREE.Vector3(0, 50, 30),      // 连环船阵
                new THREE.Vector3(-60, 40, -10),   // 黄盖火船
                new THREE.Vector3(-20, 60, 20),    // 火攻过程
                new THREE.Vector3(0, 80, 0),       // 火势蔓延
                new THREE.Vector3(30, 100, 50),    // 曹操败走
                new THREE.Vector3(0, 120, 0),      // 最终全景
            ];
            
            // 创建平滑曲线
            const curve = new THREE.CatmullRomCurve3(points);
            cameraPath = curve.getPoints(200);
        }

        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 开始演示
        function startDemo() {
            document.getElementById('instructions').style.display = 'none';
            play();
        }

        // 播放
        function play() {
            isPlaying = true;
            document.getElementById('play-btn').style.opacity = '0.5';
            document.getElementById('pause-btn').style.opacity = '1';
        }

        // 暂停
        function pause() {
            isPlaying = false;
            document.getElementById('play-btn').style.opacity = '1';
            document.getElementById('pause-btn').style.opacity = '0.5';
        }

        // 重置
        function reset() {
            timeline.current = 0;
            pathIndex = 0;
            
            // 重置军队位置
            caoArmy.position.set(0, 2, 50);
            sunLiuArmy.position.set(-50, 2, -50);
            
            // 重置船只
            ships.forEach(ship => {
                ship.position.copy(ship.userData.originalPosition);
            });
            
            fireShips.forEach(ship => {
                ship.position.copy(ship.userData.originalPosition);
                if (ship.userData.fire) {
                    ship.userData.fire.visible = false;
                }
            });
            
            // 隐藏风粒子
            windParticles.forEach(p => p.visible = false);
            
            // 重置时间线
            document.getElementById('timeline-progress').style.width = '0%';
            document.getElementById('event-text').textContent = timeline.events[0].text;
            
            // 重置相机
            camera.position.copy(cameraPath[0]);
            camera.lookAt(0, 0, 0);
            
            pause();
        }

        // 时间线点击
        function onTimelineClick(e) {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = x / rect.width;
            timeline.current = percentage * timeline.duration;
            
            // 更新进度条
            document.getElementById('timeline-progress').style.width = `${percentage * 100}%`;
            
            // 更新事件文本
            updateEventText();
        }

        // 更新事件文本
        function updateEventText() {
            let currentEvent = timeline.events[0];
            for (let i = timeline.events.length - 1; i >= 0; i--) {
                if (timeline.current >= timeline.events[i].time) {
                    currentEvent = timeline.events[i];
                    break;
                }
            }
            document.getElementById('event-text').textContent = currentEvent.text;
        }

        // 更新场景
        function update() {
            if (!isPlaying) return;
            
            const delta = clock.getDelta();
            timeline.current += delta;
            
            // 更新进度条
            const percentage = (timeline.current / timeline.duration) * 100;
            document.getElementById('timeline-progress').style.width = `${percentage}%`;
            
            // 更新事件文本
            updateEventText();
            
            // 更新相机位置
            updateCamera();
            
            // 更新军队移动
            updateArmies();
            
            // 更新船只
            updateShips();
            
            // 更新火船
            updateFireShips();
            
            // 更新风粒子
            updateWindParticles();
            
            // 更新火势
            updateFire();
            
            // 更新水面动画
            updateWater();
            
            // 检查是否结束
            if (timeline.current >= timeline.duration) {
                pause();
                timeline.current = timeline.duration;
            }
        }

        // 更新相机
        function updateCamera() {
            const progress = timeline.current / timeline.duration;
            const index = Math.floor(progress * (cameraPath.length - 1));
            
            if (index < cameraPath.length - 1) {
                const t = (progress * (cameraPath.length - 1)) - index;
                const currentPoint = cameraPath[index];
                const nextPoint = cameraPath[index + 1];
                
                camera.position.lerpVectors(currentPoint, nextPoint, t);
                camera.lookAt(0, 0, 0);
            }
        }

        // 更新军队
        function updateArmies() {
            const time = timeline.current;
            
            // 曹操军向南移动
            if (time > 5 && time < 25) {
                caoArmy.position.z = 50 - (time - 5) * 1.5;
            }
            
            // 孙刘联军向北移动
            if (time > 10 && time < 25) {
                sunLiuArmy.position.z = -50 + (time - 10) * 1;
                sunLiuArmy.position.x = -50 + (time - 10) * 0.5;
            }
            
            // 战斗时军队混乱
            if (time > 30 && time < 50) {
                const soldiers = caoArmy.children;
                soldiers.forEach(soldier => {
                    soldier.position.x += (Math.random() - 0.5) * 0.1;
                    soldier.position.z += (Math.random() - 0.5) * 0.1;
                });
            }
        }

        // 更新船只
        function updateShips() {
            const time = timeline.current;
            
            // 连环船阵形成
            if (time > 15 && time < 20) {
                const progress = (time - 15) / 5;
                ships.forEach((ship, index) => {
                    const targetX = -30 + index * 10;
                    const targetZ = 10;
                    ship.position.x += (targetX - ship.position.x) * 0.02;
                    ship.position.z += (targetZ - ship.position.z) * 0.02;
                });
            }
        }

        // 更新火船
        function updateFireShips() {
            const time = timeline.current;
            
            // 黄盖火船出发
            if (time > 25 && time < 35) {
                const progress = (time - 25) / 10;
                fireShips.forEach((ship, index) => {
                    // 向曹军移动
                    ship.position.x += 0.5;
                    ship.position.z += 0.3;
                    
                    // 显示火焰
                    if (progress > 0.3 && ship.userData.fire) {
                        ship.userData.fire.visible = true;
                        // 火焰动画
                        ship.userData.fire.scale.y = 1 + Math.sin(time * 10) * 0.2;
                    }
                });
            }
            
            // 火船撞上连环船
            if (time > 35) {
                fireShips.forEach((ship, index) => {
                    if (index < ships.length) {
                        // 火船与连环船碰撞
                        ship.position.lerp(ships[index].position, 0.01);
                    }
                });
            }
        }

        // 更新风粒子
        function updateWindParticles() {
            const time = timeline.current;
            
            // 东南风出现（火攻时）
            if (time > 25 && time < 50) {
                windParticles.forEach(particles => {
                    particles.visible = true;
                    
                    const positions = particles.geometry.attributes.position.array;
                    const velocities = particles.geometry.attributes.velocity.array;
                    
                    for (let i = 0; i < positions.length; i += 3) {
                        // 更新位置
                        positions[i] += velocities[i];
                        positions[i + 1] += velocities[i + 1];
                        positions[i + 2] += velocities[i + 2];
                        
                        // 重置超出范围的粒子
                        if (positions[i] < -50 || positions[i + 2] > -25) {
                            positions[i] = Math.random() * 100 - 50;
                            positions[i + 1] = Math.random() * 20 + 5;
                            positions[i + 2] = Math.random() * 50 - 75;
                        }
                    }
                    
                    particles.geometry.attributes.position.needsUpdate = true;
                });
            } else {
                windParticles.forEach(p => p.visible = false);
            }
        }

        // 更新火势
        function updateFire() {
            const time = timeline.current;
            
            // 火势蔓延
            if (time > 35 && time < 50) {
                const progress = (time - 35) / 15;
                
                // 曹军船只着火
                ships.forEach((ship, index) => {
                    if (index < Math.floor(progress * ships.length) + 1) {
                        // 添加着火效果
                        if (!ship.userData.onFire) {
                            const fireGeometry = new THREE.ConeGeometry(2, 3, 6);
                            const fireMaterial = new THREE.MeshBasicMaterial({ 
                                color: 0xff4500,
                                transparent: true,
                                opacity: 0.7
                            });
                            const fire = new THREE.Mesh(fireGeometry, fireMaterial);
                            fire.position.y = 4;
                            ship.add(fire);
                            ship.userData.onFire = true;
                            ship.userData.fire = fire;
                        }
                        
                        // 火焰动画
                        if (ship.userData.fire) {
                            ship.userData.fire.scale.y = 1 + Math.sin(time * 8 + index) * 0.3;
                            ship.userData.fire.rotation.y = time * 2;
                        }
                    }
                });
                
                // 添加烟雾粒子
                if (Math.random() < 0.1) {
                    createSmoke();
                }
            }
        }

        // 创建烟雾
        function createSmoke() {
            const smokeGeometry = new THREE.SphereGeometry(1, 8, 8);
            const smokeMaterial = new THREE.MeshBasicMaterial({
                color: 0x333333,
                transparent: true,
                opacity: 0.4
            });
            
            const smoke = new THREE.Mesh(smokeGeometry, smokeMaterial);
            smoke.position.set(
                Math.random() * 60 - 30,
                10 + Math.random() * 10,
                10 + Math.random() * 20
            );
            smoke.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.1,
                0.1 + Math.random() * 0.1,
                (Math.random() - 0.5) * 0.1
            );
            smoke.userData.life = 3;
            
            scene.add(smoke);
            
            // 动画烟雾
            const animateSmoke = () => {
                smoke.position.add(smoke.userData.velocity);
                smoke.userData.life -= 0.016;
                smoke.material.opacity = smoke.userData.life / 3 * 0.4;
                smoke.scale.multiplyScalar(1.01);
                
                if (smoke.userData.life > 0) {
                    requestAnimationFrame(animateSmoke);
                } else {
                    scene.remove(smoke);
                }
            };
            
            animateSmoke();
        }

        // 更新水面
        function updateWater() {
            const time = clock.getElapsedTime();
            const waterVertices = water.geometry.attributes.position.array;
            
            for (let i = 0; i < waterVertices.length; i += 3) {
                const x = waterVertices[i];
                waterVertices[i + 1] = Math.sin(x * 0.1 + time) * 0.5;
            }
            
            water.geometry.attributes.position.needsUpdate = true;
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            update();
            renderer.render(scene, camera);
        }

        // 初始化并开始
        init();
        animate();
    </script>
</body>
</html>
