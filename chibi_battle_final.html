<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤壁之战 · 3D 俯瞰战术演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Microsoft YaHei','SimHei',sans-serif;color:#fff}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.hud-top{position:absolute;top:0;left:0;width:100%;text-align:center;padding:20px 0;background:linear-gradient(180deg,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.4) 60%,transparent 100%)}
.hud-top h1{font-size:36px;color:#ffd700;letter-spacing:10px;text-shadow:0 0 30px rgba(255,165,0,0.7),0 0 60px rgba(255,69,0,0.3)}
.hud-top .sub{font-size:13px;color:#999;margin-top:6px;letter-spacing:3px}
#phase-tag{position:absolute;top:100px;left:50%;transform:translateX(-50%);font-size:22px;color:#ff6347;letter-spacing:4px;text-shadow:0 0 15px rgba(255,50,0,0.6);opacity:0;transition:opacity 0.8s}
#phase-tag.show{opacity:1}
#info-panel{position:absolute;bottom:100px;left:30px;background:rgba(0,0,0,0.8);border:1px solid rgba(255,215,0,0.25);border-radius:14px;padding:18px 22px;max-width:440px;backdrop-filter:blur(10px);transition:opacity 0.5s}
#info-panel .ev{font-size:15px;line-height:1.8;color:#ddd}
#info-panel .ev b{color:#ffd700;font-weight:600}
#info-panel .ev em{color:#ff6347;font-style:normal}
#progress{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:min(60%,650px)}
#prog-track{width:100%;height:3px;background:rgba(255,255,255,0.12);border-radius:2px}
#prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff4500,#ff8c00,#ffd700);border-radius:2px;transition:width 0.2s linear}
#prog-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:9px;color:#666;letter-spacing:1px}
#btns{position:absolute;bottom:88px;right:30px;display:flex;gap:10px;pointer-events:auto}
#btns button{background:rgba(20,20,20,0.9);border:1px solid rgba(255,215,0,0.35);color:#ffd700;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:13px;letter-spacing:1px;transition:all 0.25s}
#btns button:hover{background:rgba(255,215,0,0.15);border-color:#ffd700}
#btns button.active{background:rgba(255,69,0,0.2);border-color:#ff4500}
#legend{position:absolute;top:100px;right:30px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 18px;backdrop-filter:blur(8px);font-size:12px;line-height:2}
.leg-item{display:flex;align-items:center;gap:8px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-top">
    <h1>赤 壁 之 战</h1>
    <div class="sub">建安十三年 · 孙刘联军破曹操八十万大军</div>
  </div>
  <div id="phase-tag"></div>
  <div id="info-panel">
    <div class="ev" id="event-text">点击 <b>播放</b> 开始演示</div>
  </div>
  <div id="progress">
    <div id="prog-track"><div id="prog-fill"></div></div>
    <div id="prog-labels"><span>对峙</span><span>诈降</span><span>火烧</span><span>追击</span><span>华容道</span></div>
  </div>
  <div id="btns">
    <button id="playBtn" onclick="togglePlay()">▶ 播放</button>
    <button onclick="resetAnim()">⟲ 重置</button>
  </div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#e74c3c"></div> 曹操军</div>
    <div class="leg-item"><div class="leg-dot" style="background:#3498db"></div> 孙刘联军</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f39c12"></div> 火攻区域</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1abc9c"></div> 东南风</div>
  </div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();window.onresize=resize;

/* ═══════════════ 全局参数 ═══════════════ */
let t=0, playing=false, lastTS=0, speed=1;
const RIVER_Y=0.52, RIVER_H=0.22;

/* ═══════════════ 3D 透视投影 ═══════════════ */
const CAM={x:0,y:-180,z:320,tilt:0.85};
function project(px,py,pz){
  let ry=py-CAM.y, rz=pz-CAM.z;
  if(rz<-10) rz=-10;
  let d=-CAM.z/rz;
  return{
    sx:W/2+px*d,
    sy:H*RIVER_Y-ry*d*0.6,
    scale:Math.max(0.05,d*0.9),
    depth:rz
  };
}

/* ═══════════════ 地形 ═══════════════ */
function drawTerrain(){
  // 南岸
  let g1=X.createLinearGradient(0,H*(RIVER_Y-RIVER_H*0.8),0,H*RIVER_Y);
  g1.addColorStop(0,'#1a3d1a');g1.addColorStop(1,'#2d5a2d');
  X.fillStyle=g1;
  X.fillRect(0,0,W,H*RIVER_Y);

  // 北岸
  let g2=X.createLinearGradient(0,H*(RIVER_Y+RIVER_H*0.5),0,H);
  g2.addColorStop(0,'#2d5a2d');g2.addColorStop(1,'#1a3d1a');
  X.fillStyle=g2;
  X.fillRect(0,H*(RIVER_Y+RIVER_H*0.5),W,H*0.5);

  // 山丘
  drawHills(0.12,0.35,'#1e4420',0.7);
  drawHills(0.88,0.32,'#1e4420',0.6);
  drawHills(0.05,0.75,'#1e4420',0.5);
  drawHills(0.95,0.72,'#1e4420',0.5);

  // 长江
  let rg=X.createLinearGradient(0,H*(RIVER_Y-RIVER_H*0.5),0,H*(RIVER_Y+RIVER_H*0.5));
  rg.addColorStop(0,'#1a3a5c');rg.addColorStop(0.3,'#1e4a6e');rg.addColorStop(0.7,'#1e4a6e');rg.addColorStop(1,'#1a3a5c');
  X.fillStyle=rg;
  X.fillRect(0,H*(RIVER_Y-RIVER_H*0.45),W,H*RIVER_H*0.95);

  // 水面波纹
  X.save();
  for(let i=0;i<30;i++){
    let wx=(i*W/30+Math.sin(t*0.8+i*1.7)*12)%W;
    let wy=H*(RIVER_Y-RIVER_H*0.3)+Math.sin(t*0.5+i*2.1)*H*RIVER_H*0.15;
    X.beginPath();
    X.moveTo(wx,wy);
    X.quadraticCurveTo(wx+20+Math.sin(t+i)*5,wy-3,wx+40,wy);
    X.strokeStyle='rgba(100,180,255,0.15)';
    X.lineWidth=1;
    X.stroke();
  }
  X.restore();

  // 地名标注
  X.font='bold 16px Microsoft YaHei';
  X.textAlign='center';
  X.fillStyle='rgba(200,230,255,0.7)';
  X.fillText('南 岸 · 江 夏',W*0.25,H*(RIVER_Y-RIVER_H*0.6));
  X.fillText('赤 壁',W*0.5,H*(RIVER_Y-RIVER_H*0.6));
  X.fillText('南 岸 · 柴 桑',W*0.78,H*(RIVER_Y-RIVER_H*0.6));
  X.fillStyle='rgba(200,230,255,0.5)';
  X.fillText('北 岸 · 乌 林',W*0.6,H*(RIVER_Y+RIVER_H*0.65));
  X.fillText('长    江',W*0.5,H*RIVER_Y+4);

  drawHillShapes();
}

function drawHills(cx,cy,col,a){
  X.save();
  X.globalAlpha=a;
  X.fillStyle=col;
  for(let i=0;i<4;i++){
    let hx=W*cx+Math.cos(i*2.3)*40;
    let hy=H*cy+Math.sin(i*1.7)*20;
    X.beginPath();
    X.ellipse(hx,hy,30+i*8,15+i*5,0,0,Math.PI*2);
    X.fill();
  }
  X.restore();
}

function drawHillShapes(){
  X.save();
  X.fillStyle='rgba(30,80,30,0.6)';
  [[0.1,0.28,40,20],[0.2,0.32,30,15],[0.85,0.3,35,18],[0.92,0.28,25,12],
   [0.08,0.7,30,15],[0.15,0.75,35,18],[0.88,0.68,28,14],[0.95,0.72,32,16]
  ].forEach(([hx,hy,rx,ry])=>{
    X.beginPath();X.ellipse(W*hx,H*hy,rx,ry,0,0,Math.PI*2);X.fill();
  });
  X.restore();
}

/* ═══════════════ 军队单位 ═══════════════ */
class ArmyUnit{
  constructor(name,color,x,y,icon,size=1){
    this.name=name;this.color=color;
    this.baseX=x;this.baseY=y;
    this.x=x;this.y=y;
    this.icon=icon;this.size=size;
    this.offsetX=0;this.offsetY=0;
  }
  moveTo(tx,ty,dur){
    this.tStart=t;this.tEnd=t+dur;
    this.fromX=this.x;this.fromY=this.y;
    this.toX=tx;this.toY=ty;
    this.moving=true;
  }
  update(){
    if(this.moving&&t>=this.tStart){
      let p=Math.min(1,(t-this.tStart)/(this.tEnd-this.tStart));
      p=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      this.x=this.fromX+(this.toX-this.fromX)*p;
      this.y=this.fromY+(this.toY-this.fromY)*p;
      if(p>=1)this.moving=false;
    }
    this.offsetX=Math.sin(t*2+this.baseX*10)*1.5;
    this.offsetY=Math.cos(t*1.7+this.baseY*8)*1;
  }
  draw(){
    let sx=W*this.x+this.offsetX;
    let sy=H*this.y+this.offsetY;
    let r=12*this.size;

    // 发光
    let grd=X.createRadialGradient(sx,sy,r*0.3,sx,sy,r*2.5);
    grd.addColorStop(0,this.color+'60');
    grd.addColorStop(1,this.color+'00');
    X.fillStyle=grd;
    X.fillRect(sx-r*3,sy-r*3,r*6,r*6);

    // 圆底
    X.beginPath();X.arc(sx,sy,r,0,Math.PI*2);
    X.fillStyle=this.color+'cc';X.fill();
    X.strokeStyle=this.color;X.lineWidth=2;X.stroke();

    // 图标
    X.font=`bold ${Math.round(14*this.size)}px serif`;
    X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#fff';
    X.fillText(this.icon,sx,sy+1);

    // 名称
    X.font=`${Math.round(10*this.size)}px Microsoft YaHei`;
    X.fillStyle='rgba(255,255,255,0.85)';
    X.fillText(this.name,sx,sy+r+12);
  }
}

// 曹操军
const caoCao=new ArmyUnit('曹操','#e74c3c',0.62,0.74,'👑',1.3);
const caoCaoFleet=new ArmyUnit('水军','#c0392b',0.55,0.68,'🚢',1.1);

// 孙刘联军
const zhouYu=new ArmyUnit('周瑜','#3498db',0.5,0.38,'⚔',1.2);
const liuBei=new ArmyUnit('刘备','#2980b9',0.35,0.42,'🛡',1.0);
const huangGai=new ArmyUnit('黄盖','#2ecc71',0.48,0.4,'🔥',1.0);

// 连环船阵
let ships=[];
function initShips(){
  ships=[];
  for(let i=0;i<12;i++){
    let row=Math.floor(i/4);
    let col=i%4;
    ships.push({
      x:0.48+col*0.04,
      y:0.62+row*0.04,
      linked:false,burning:false,fireTime:0,
      sinkProgress:0,sinking:false,
      size:0.7+Math.random()*0.3
    });
  }
}
initShips();

/* ═══════════════ 行军路线 ═══════════════ */
function drawRoutes(){
  X.save();
  X.setLineDash([]);
  X.lineWidth=2;

  // 曹操南下路线
  if(phase>=0){
    let a=Math.min(1,(t-0)/3);
    X.beginPath();
    X.strokeStyle='rgba(231,76,60,0.4)';
    X.lineWidth=3;
    drawDashedPath([
      [0.65,0.05],[0.63,0.15],[0.62,0.3],[0.6,0.55],[0.62,0.74]
    ],a);
    // 箭头
    drawArrow(0.62,0.68,Math.PI/2,'rgba(231,76,60,0.6)');
  }

  // 联军集结路线
  if(phase>=0){
    let a=Math.min(1,(t-0)/4);
    X.beginPath();X.strokeStyle='rgba(52,152,219,0.4)';X.lineWidth=3;
    drawDashedPath([[0.35,0.15],[0.38,0.28],[0.42,0.38],[0.5,0.38]],a);
    drawDashedPath([[0.15,0.25],[0.25,0.32],[0.35,0.38],[0.42,0.4]],a);
    drawArrow(0.45,0.38,-Math.PI*0.3,'rgba(52,152,219,0.6)');
  }

  // 曹操败走路线
  if(phase>=4){
    X.beginPath();X.strokeStyle='rgba(231,76,60,0.5)';X.lineWidth=2;
    let a=Math.min(1,(t-phases[4].start)/3);
    drawDashedPath([
      [0.55,0.65],[0.6,0.7],[0.7,0.72],[0.8,0.68],[0.88,0.6],[0.92,0.5]
    ],a);
    drawArrow(0.85,0.62,Math.PI*0.6,'rgba(231,76,60,0.5)');

    X.font='11px Microsoft YaHei';
    X.fillStyle='rgba(231,76,60,0.7)';
    X.textAlign='center';
    X.fillText('华容道',W*0.88,H*0.55);
  }

  X.restore();
}

function drawDashedPath(pts,progress){
  X.beginPath();
  let totalLen=0;
  let segs=[];
  for(let i=1;i<pts.length;i++){
    let dx=(pts[i][0]-pts[i-1][0])*W;
    let dy=(pts[i][1]-pts[i-1][1])*H;
    let l=Math.sqrt(dx*dx+dy*dy);
    segs.push({l,len:l});
    totalLen+=l;
  }
  let drawLen=totalLen*progress;
  let acc=0;
  X.moveTo(pts[0][0]*W,pts[0][1]*H);
  for(let i=0;i<segs.length;i++){
    let remain=drawLen-acc;
    if(remain<=0)break;
    let frac=Math.min(1,remain/segs[i].len);
    let nx=(pts[i+1][0]-pts[i][0])*frac+pts[i][0];
    let ny=(pts[i+1][1]-pts[i][1])*frac+pts[i][1];
    X.lineTo(nx*W,ny*H);
    acc+=segs[i].len;
  }
  X.setLineDash([8,6]);
  X.stroke();
}

function drawArrow(ax,ay,angle,col){
  X.save();
  X.translate(W*ax,H*ay);X.rotate(angle);
  X.beginPath();
  X.moveTo(10,0);X.lineTo(-5,-6);X.lineTo(-5,6);X.closePath();
  X.fillStyle=col;X.fill();
  X.restore();
}

/* ═══════════════ 连环船阵 ═══════════════ */
function drawLinkedShips(){
  // 连接线
  if(phase>=1){
    ships.forEach((s,i)=>{
      if(!s.linked)return;
      let sx=W*s.x,sy=H*s.y;
      ships.forEach((s2,j)=>{
        if(j<=i||!s2.linked)return;
        let d=Math.hypot(s2.x-s.x,s2.y-s.y);
        if(d<0.06){
          X.beginPath();
          X.moveTo(sx,sy);X.lineTo(W*s2.x,H*s2.y);
          X.strokeStyle='rgba(180,140,60,0.5)';X.lineWidth=2;X.stroke();
        }
      });
    });
  }

  ships.forEach((s,i)=>{
    let sx=W*s.x,sy=H*s.y;
    let sz=s.size*18;

    // 船体
    X.save();
    X.translate(sx,sy);
    X.rotate(Math.sin(t*0.3+i)*0.05);

    if(s.sinking){
      s.sinkProgress=Math.min(1,s.sinkProgress+0.005);
      X.globalAlpha=1-s.sinkProgress;
      X.translate(0,s.sinkProgress*20);
      X.scale(1-s.sinkProgress*0.3,1-s.sinkProgress*0.3);
    }

    // 船身
    X.beginPath();
    X.ellipse(0,0,sz,sz*0.45,0,0,Math.PI*2);
    X.fillStyle=s.burning?'#8B4513':'#654321';
    X.fill();
    X.strokeStyle='#8B6914';X.lineWidth=1.5;X.stroke();

    // 桅杆
    X.beginPath();X.moveTo(0,-sz*0.3);X.lineTo(0,-sz);
    X.strokeStyle='#8B6914';X.lineWidth=2;X.stroke();

    // 帆
    if(!s.burning||s.sinkProgress<0.5){
      X.beginPath();
      X.moveTo(0,-sz*0.9);
      X.quadraticCurveTo(sz*0.4+Math.sin(t+i)*3,-sz*0.6,0,-sz*0.3);
      X.fillStyle=s.sinkProgress>0?'rgba(200,50,50,0.3)':'rgba(220,200,160,0.7)';
      X.fill();
    }

    X.restore();

    // 火焰
    if(s.burning){
      drawFire(sx,sy,sz,s.fireTime);
    }
  });
}

function drawFire(fx,fy,fs,ft){
  let intensity=Math.min(1,(t-ft)/2);
  let count=Math.floor(5+intensity*8);
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let r=Math.random()*fs;
    let px=fx+Math.cos(a)*r*0.8;
    let py=fy+Math.sin(a)*r*0.3;
    let fs2=3+Math.random()*5*(1+intensity);
    let life=(Math.sin(t*5+i*7+ft)*0.5+0.5);

    X.save();
    X.globalAlpha=life*0.8;
    let grd=X.createRadialGradient(px,py,0,px,py-fs2,fs2*2);
    grd.addColorStop(0,'#fff8e0');
    grd.addColorStop(0.3,'#ffaa00');
    grd.addColorStop(0.7,'#ff4500');
    grd.addColorStop(1,'rgba(200,0,0,0)');
    X.fillStyle=grd;
    X.beginPath();
    X.arc(px,py-fs2*0.3,fs2*2,0,Math.PI*2);
    X.fill();
    X.restore();
  }

  // 烟
  for(let i=0;i<4;i++){
    let sx2=fx+Math.sin(t*0.7+i*3)*15;
    let sy2=fy-t*3-i*20;
    let sr=10+i*5+Math.sin(t+i)*3;
    X.save();
    X.globalAlpha=0.15*(1-Math.min(1,(t-ft+i)*0.1));
    X.fillStyle='#555';
    X.beginPath();X.arc(sx2,sy2,sr,0,Math.PI*2);X.fill();
    X.restore();
  }
}

/* ═══════════════ 黄盖火船突入 ═══════════════ */
let fireShips=[];
function initFireShips(){
  fireShips=[];
  for(let i=0;i<5;i++){
    fireShips.push({
      x:0.45-i*0.02, y:0.45,
      tx:0.49+i*0.035, ty:0.62+i*0.025,
      started:false, arrived:false,
      trail:[]
    });
  }
}
initFireShips();

function drawFireShips(){
  if(phase<2)return;
  fireShips.forEach((fs,i)=>{
    if(!fs.started)return;
    let p=Math.min(1,(t-fs.startTime)/4);
    let ep=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    fs.x=fs.sx+(fs.tx-fs.sx)*ep;
    fs.y=fs.sy+(fs.ty-fs.sy)*ep;

    let sx=W*fs.x,sy=H*fs.y;

    // 尾迹
    fs.trail.push({x:sx,y:sy,t:t});
    if(fs.trail.length>40)fs.trail.shift();
    X.save();
    X.beginPath();
    fs.trail.forEach((pt,idx)=>{
      if(idx===0)X.moveTo(pt.x,pt.y);
      else X.lineTo(pt.x,pt.y);
    });
    X.strokeStyle='rgba(255,80,0,0.3)';
    X.lineWidth=4;X.stroke();
    X.restore();

    // 火船本体
    X.save();
    X.translate(sx,sy);
    let angle=Math.atan2(fs.ty-fs.sy,fs.tx-fs.sx);
    X.rotate(angle+Math.PI/2);

    // 船身
    X.beginPath();
    X.ellipse(0,0,14,6,0,0,Math.PI*2);
    X.fillStyle='#8B4513';X.fill();
    X.strokeStyle='#ff6600';X.lineWidth=1.5;X.stroke();

    // 大火
    drawFire(0,-8,10,t);
    drawFire(0,0,12,t+1);

    X.restore();

    // 到达目标点
    if(p>=1&&!fs.arrived){
      fs.arrived=true;
      fs.burnStartTime=t;
    }
  });
}

/* ═══════════════ 东南风粒子 ═══════════════ */
let windParticles=[];
function initWind(){
  windParticles=[];
  for(let i=0;i<120;i++){
    windParticles.push({
      x:Math.random()*W*1.2-W*0.1,
      y:H*RIVER_Y-RIVER_H*H*0.3+Math.random()*RIVER_H*H*0.6,
      vx:1.5+Math.random()*2.5,
      vy:-0.5+Math.random()*0.8,
      size:1+Math.random()*2,
      life:Math.random(),
      alpha:0.15+Math.random()*0.35
    });
  }
}
initWind();

function drawWind(){
  let show=phase>=1&&phase<=4;
  if(!show)return;
  let intensity=phase>=2&&phase<=3?1:0.4;

  windParticles.forEach(wp=>{
    wp.x+=wp.vx*intensity*1.5;
    wp.y+=wp.vy*intensity;
    wp.life-=0.003*intensity;

    if(wp.x>W*1.1||wp.life<=0){
      wp.x=-10;
      wp.y=H*RIVER_Y-RIVER_H*H*0.2+Math.random()*RIVER_H*H*0.5;
      wp.life=1;
    }

    let a=wp.alpha*wp.life*intensity;
    X.save();
    X.globalAlpha=a;

    // 箭头形粒子
    let angle=Math.atan2(wp.vy,wp.vx);
    X.translate(wp.x,wp.y);
    X.rotate(angle);
    X.beginPath();
    X.moveTo(wp.size*3,0);
    X.lineTo(-wp.size,-wp.size);
    X.lineTo(-wp.size*0.5,0);
    X.lineTo(-wp.size,wp.size);
    X.closePath();
    X.fillStyle='#1abc9c';
    X.fill();

    // 拖尾
    X.beginPath();
    X.moveTo(0,0);
    X.lineTo(-wp.size*5,0);
    X.strokeStyle='rgba(26,188,156,'+(a*0.5)+')';
    X.lineWidth=wp.size*0.5;
    X.stroke();

    X.restore();
  });

  // 风向标注
  if(phase>=1){
    X.save();
    X.globalAlpha=0.5*intensity+0.3;
    let wx=W*0.75,wy=H*0.44;
    X.font='bold 14px Microsoft YaHei';
    X.fillStyle='#1abc9c';
    X.textAlign='center';
    X.fillText('↘ 东 南 风',wx,wy);

    // 大箭头
    X.beginPath();
    X.moveTo(wx+30,wy+8);
    X.lineTo(wx+60,wy+22);
    X.strokeStyle='#1abc9c';
    X.lineWidth=2.5;X.stroke();
    X.beginPath();
    X.moveTo(wx+60,wy+22);
    X.lineTo(wx+52,wy+16);
    X.moveTo(wx+60,wy+22);
    X.lineTo(wx+54,wy+28);
    X.stroke();
    X.restore();
  }
}

/* ═══════════════ 火势蔓延 ═══════════════ */
function drawFireSpread(){
  if(phase<2)return;
  let spreadProgress=Math.min(1,(t-phases[2].start)/8);

  if(spreadProgress>0.3){
    let fireArea={cx:W*0.52,cy:H*0.65,rx:60+spreadProgress*120,ry:25+spreadProgress*50};
    X.save();
    X.globalAlpha=0.15+spreadProgress*0.2;

    let grd=X.createRadialGradient(fireArea.cx,fireArea.cy,0,fireArea.cx,fireArea.cy,fireArea.rx);
    grd.addColorStop(0,'rgba(255,100,0,0.4)');
    grd.addColorStop(0.5,'rgba(255,50,0,0.2)');
    grd.addColorStop(1,'rgba(200,0,0,0)');
    X.fillStyle=grd;
    X.beginPath();
    X.ellipse(fireArea.cx,fireArea.cy,fireArea.rx,fireArea.ry,0,0,Math.PI*2);
    X.fill();
    X.restore();
  }

  // 火势边缘飞散火星
  if(spreadProgress>0.1){
    for(let i=0;i<15;i++){
      let a=t*2+i*2.1;
      let r=30+spreadProgress*80;
      let px=W*0.52+Math.cos(a)*r*(0.8+Math.sin(a*0.5)*0.3);
      let py=H*0.65+Math.sin(a)*r*0.4;
      let fs2=1+Math.random()*2;
      X.save();
      X.globalAlpha=0.3+Math.sin(t*3+i)*0.2;
      X.fillStyle='#ff6600';
      X.beginPath();X.arc(px,py,fs2,0,Math.PI*2);X.fill();
      X.restore();
    }
  }
}

/* ═══════════════ 曹操败走 ═══════════════ */
function drawRetreat(){
  if(phase<4)return;
  let p=Math.min(1,(t-phases[4].start)/5);

  // 败兵标记
  let retreaters=[
    {x:0.55+p*0.08,y:0.66+p*0.02,label:'败兵'},
    {x:0.6+p*0.1,y:0.7+p*0.01,label:''},
    {x:0.58+p*0.06,y:0.72,label:''},
  ];

  retreaters.forEach((r,i)=>{
    let sx=W*r.x,sy=H*r.y;
    X.save();
    X.globalAlpha=0.5*(1-p*0.3);
    X.beginPath();X.arc(sx,sy,5,0,Math.PI*2);
    X.fillStyle='#c0392b';X.fill();
    if(r.label){
      X.font='10px Microsoft YaHei';
      X.fillStyle='rgba(192,57,43,0.6)';
      X.textAlign='center';
      X.fillText(r.label,sx,sy+14);
    }
    X.restore();
  });

  // 联军追击
  if(p>0.3){
    let ap=(p-0.3)/0.7;
    let zx=W*(0.48+ap*0.12);
    let zy=H*(0.5-ap*0.05);
    X.save();
    X.globalAlpha=ap*0.6;
    X.beginPath();X.arc(zx,zy,6,0,Math.PI*2);
    X.fillStyle='#3498db';X.fill();
    X.font='9px Microsoft YaHei';
    X.fillStyle='#3498db';
    X.textAlign='center';
    X.fillText('追',zx,zy-10);
    X.restore();
  }
}

/* ═══════════════ 地标 ═══════════════ */
function drawLandmarks(){
  // 赤壁崖
  let rx=W*0.42,ry=H*0.48;
  X.save();
  X.fillStyle='#5a3a1a';
  X.beginPath();
  X.moveTo(rx-15,ry);X.lineTo(rx-8,ry-22);X.lineTo(rx+5,ry-18);X.lineTo(rx+12,ry-28);X.lineTo(rx+18,ry-15);X.lineTo(rx+20,ry);
  X.closePath();X.fill();
  X.font='bold 11px Microsoft YaHei';
  X.fillStyle='rgba(255,200,100,0.8)';
  X.textAlign='center';
  X.fillText('赤壁',rx+2,ry-32);
  X.restore();

  // 乌林
  let ux=W*0.58,uy=H*0.76;
  X.save();
  X.fillStyle='#4a3a2a';
  X.beginPath();
  X.moveTo(ux-12,uy);X.lineTo(ux-5,uy-16);X.lineTo(ux+8,uy-12);X.lineTo(ux+15,uy-20);X.lineTo(ux+18,uy);
  X.closePath();X.fill();
  X.font='11px Microsoft YaHei';
  X.fillStyle='rgba(200,180,150,0.6)';
  X.textAlign='center';
  X.fillText('乌林',ux+3,uy-24);
  X.restore();

  // 华容道
  if(phase>=4){
    X.save();
    X.setLineDash([3,3]);
    X.beginPath();
    X.moveTo(W*0.8,H*0.52);
    X.quadraticCurveTo(W*0.88,H*0.48,W*0.95,H*0.38);
    X.strokeStyle='rgba(231,76,60,0.3)';
    X.lineWidth=2;X.stroke();
    X.setLineDash([]);
    X.font='11px Microsoft YaHei';
    X.fillStyle='rgba(231,76,60,0.5)';
    X.textAlign='center';
    X.fillText('华容道',W*0.88,H*0.44);
    X.restore();
  }
}

/* ═══════════════ 攻守态势箭头 ═══════════════ */
function drawBattleArrows(){
  if(phase<2||phase>3)return;
  let a=Math.min(1,(t-phases[2].start)/3);

  // 孙刘联军进攻箭头
  X.save();
  X.globalAlpha=a*0.5;
  X.strokeStyle='#3498db';
  X.lineWidth=3;
  X.setLineDash([6,4]);
  X.beginPath();
  X.moveTo(W*0.48,H*0.42);
  X.lineTo(W*0.52,H*0.58);
  X.stroke();
  drawArrow(0.52,0.58,Math.PI*0.6,'rgba(52,152,219,0.6)');
  X.restore();

  // 曹操防守线
  if(phase>=1&&phase<3){
    X.save();
    X.globalAlpha=0.3;
    X.strokeStyle='#e74c3c';
    X.lineWidth=2;
    X.setLineDash([4,4]);
    X.beginPath();
    X.moveTo(W*0.4,H*0.63);
    X.quadraticCurveTo(W*0.55,H*0.58,W*0.7,H*0.63);
    X.stroke();
    X.setLineDash([]);
    X.restore();
  }
}

/* ═══════════════ 阶段控制 ═══════════════ */
const phases=[
  {start:0,dur:8,label:'第一幕 · 兵临赤壁',event:'<b>曹操</b>率八十万大军沿江而来，战船首尾相连。孙刘联军退至<em>赤壁</em>南岸，周瑜、刘备在此会师，共商破曹大计。'},
  {start:8,dur:6,label:'第二幕 · 东南风起',event:'谋士<b>庞统</b>献连环计，曹操将战船首尾用铁链锁在一起。<b>黄盖</b>诈降，率火船预备。此时<em>东南风</em>骤起，天助联军！'},
  {start:14,dur:10,label:'第三幕 · 火烧赤壁',event:'<b>黄盖</b>率火船冲入曹军船阵，火势借<em>东南风</em>顺风蔓延！曹操连环战船<em>尽数着火</em>，火光冲天，曹军大乱。'},
  {start:24,dur:6,label:'第四幕 · 曹军溃败',event:'曹操水寨<em>化为火海</em>，陆军营寨亦被波及。曹操被迫烧毁剩余战船，从陆路向北仓皇撤退。'},
  {start:30,dur:6,label:'第五幕 · 华容道',event:'曹操经<em>华容道</em>狼狈北逃，联军穷追不舍。此役曹操损兵折将，元气大伤，三国鼎立之势由此奠定。'}
];
let phase=0;
let phaseStartTime=0;

function updatePhase(){
  for(let i=phases.length-1;i>=0;i--){
    if(t>=phases[i].start){
      if(phase!==i){
        phase=i;
        phaseStartTime=t;
        document.getElementById('phase-tag').textContent=phases[i].label;
        document.getElementById('phase-tag').classList.add('show');
        document.getElementById('event-text').innerHTML=phases[i].event;
        onPhaseEnter(i);
      }
      break;
    }
  }
}

function onPhaseEnter(p){
  if(p===1){
    // 连环船
    ships.forEach(s=>{s.linked=true;});
  }
  if(p===2){
    // 火船突入
    fireShips.forEach((fs,i)=>{
      fs.sx=fs.x;fs.sy=fs.y;
      fs.started=true;
      fs.startTime=t+i*0.3;
    });
    // 船开始着火
    setTimeout(()=>{
      ships.forEach((s,i)=>{
        setTimeout(()=>{s.burning=true;s.fireTime=t;},i*200);
      });
    },1500);
  }
  if(p===4){
    // 曹操败走
    caoCao.moveTo(0.85,0.55,5);
    caoCaoFleet.moveTo(0.8,0.6,5);
  }
}

/* ═══════════════ 主渲染循环 ═══════════════ */
function render(ts){
  if(!lastTS)lastTS=ts;
  let dt=(ts-lastTS)/1000;
  lastTS=ts;

  if(playing)t+=dt*speed;
  if(t>36)t=36;

  // 清屏
  X.fillStyle='#0a0a12';
  X.fillRect(0,0,W,H);

  // 远景天际线
  drawSky();

  // 地形
  drawTerrain();

  // 地标
  drawLandmarks();

  // 风
  drawWind();

  // 行军路线
  drawRoutes();

  // 攻守态势
  drawBattleArrows();

  // 火势蔓延
  drawFireSpread();

  // 连环船阵
  drawLinkedShips();

  // 火船
  drawFireShips();

  // 军队
  caoCao.update();caoCao.draw();
  caoCaoFleet.update();caoCaoFleet.draw();
  zhouYu.update();zhouYu.draw();
  liuBei.update();liuBei.draw();
  huangGai.update();huangGai.draw();

  // 败走
  drawRetreat();

  // 更新阶段
  if(playing)updatePhase();

  // 更新进度条
  document.getElementById('prog-fill').style.width=(t/36*100)+'%';

  requestAnimationFrame(render);
}

function drawSky(){
  // 极简远景
  let skyGrad=X.createLinearGradient(0,0,0,H*RIVER_Y*0.5);
  skyGrad.addColorStop(0,'#0a0a1a');
  skyGrad.addColorStop(1,'#111125');
  X.fillStyle=skyGrad;
  X.fillRect(0,0,W,H*RIVER_Y*0.5);

  // 星星
  if(phase<3){
    X.save();
    X.fillStyle='rgba(255,255,255,0.3)';
    for(let i=0;i<50;i++){
      let sx=(i*137.5)%W;
      let sy=(i*97.3)%H*0.3;
      let ss=0.5+Math.sin(t+i)*0.3;
      X.beginPath();X.arc(sx,sy,ss,0,Math.PI*2);X.fill();
    }
    X.restore();
  }
}

/* ═══════════════ 控制 ═══════════════ */
function togglePlay(){
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸ 暂停':'▶ 播放';
  document.getElementById('playBtn').classList.toggle('active',playing);
}

function resetAnim(){
  t=0;playing=false;phase=0;
  lastTS=0;
  document.getElementById('playBtn').textContent='▶ 播放';
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('phase-tag').classList.remove('show');
  document.getElementById('event-text').innerHTML='点击 <b>播放</b> 开始演示';
  document.getElementById('prog-fill').style.width='0%';

  // 重置状态
  caoCao.x=0.62;caoCao.y=0.74;
  caoCaoFleet.x=0.55;caoCaoFleet.y=0.68;
  zhouYu.x=0.5;zhouYu.y=0.38;
  liuBei.x=0.35;liuBei.y=0.42;
  huangGai.x=0.48;huangGai.y=0.4;
  initShips();initFireShips();initWind();
}

// 键盘
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='KeyR')resetAnim();
});

requestAnimationFrame(render);
</script>
