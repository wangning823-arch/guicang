<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤壁之战 - 3D俯瞰演示</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #000;
            overflow: hidden;
            color: #fff;
        }
        #canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #ffd700;
            letter-spacing: 8px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .control-btn {
            padding: 12px 28px;
            font-size: 16px;
            background: linear-gradient(135deg, #8b0000 0%, #dc143c 100%);
            border: 2px solid #ffd700;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .control-btn:hover {
            background: linear-gradient(135deg, #dc143c 0%, #ff4500 100%);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .control-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #000;
        }
        #info-panel {
            position: absolute;
            top: 100px;
            right: 30px;
            width: 320px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        #info-panel h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        #phase-info {
            line-height: 1.8;
            font-size: 14px;
            color: #ddd;
        }
        #legend {
            position: absolute;
            top: 100px;
            left: 30px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
        }
        #legend h4 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .legend-color {
            width: 24px;
            height: 12px;
            margin-right: 10px;
            border-radius: 3px;
        }
        #wind-indicator {
            position: absolute;
            bottom: 100px;
            left: 30px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        #wind-indicator h4 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 14px;
        }
        #wind-canvas {
            width: 120px;
            height: 120px;
        }
        #timeline {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            pointer-events: auto;
        }
        #timeline input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #333, #8b0000, #ff4500);
            border-radius: 4px;
            outline: none;
        }
        #timeline input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        #timeline-label {
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: #aaa;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #loading h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 30px;
            letter-spacing: 12px;
        }
        #loading-bar {
            width: 300px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        #loading-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b0000, #ffd700);
            transition: width 0.3s;
        }
        #loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>赤壁之战</h1>
        <div id="loading-bar">
            <div id="loading-progress"></div>
        </div>
        <div id="loading-text">正在加载场景...</div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div id="ui-overlay">
        <div id="title">赤 壁 之 战</div>
        
        <div id="legend">
            <h4>图例</h4>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <span>曹军 (北方)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ecdc4;"></div>
                <span>孙刘联军 (南方)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff9500;"></div>
                <span>火船</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffcc00;"></div>
                <span>火势蔓延</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #00ff88;"></div>
                <span>东南风</span>
            </div>
        </div>
        
        <div id="info-panel">
            <h3 id="phase-title">序章：战前对峙</h3>
            <div id="phase-info">
                公元208年，曹操率八十万大军南下，意图一统天下。孙权与刘备结成联盟，共同抗曹。<br><br>
                曹军远道而来，不习水战；孙刘联军以逸待劳，据长江天险。
            </div>
        </div>
        
        <div id="wind-indicator">
            <h4>风向</h4>
            <canvas id="wind-canvas" width="120" height="120"></canvas>
        </div>
        
        <div id="timeline">
            <input type="range" id="time-slider" min="0" max="100" value="0">
            <div id="timeline-label">建安十三年 (公元208年)</div>
        </div>
        
        <div id="controls">
            <button class="control-btn" onclick="prevPhase()">◀ 上一幕</button>
            <button class="control-btn" id="play-btn" onclick="togglePlay()">▶ 播放</button>
            <button class="control-btn" onclick="nextPhase()">下一幕 ▶</button>
            <button class="control-btn" onclick="resetCamera()">重置视角</button>
        </div>
    </div>
    
    <script src="scene.js"></script>
    <script src="animation.js"></script>
    <script src="main.js"></script>
</body>
</html>
