<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归藏 (Guicang) - AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #16213e;
      padding: 1rem 2rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.5rem; color: #e94560; }
    header .subtitle { color: #888; font-size: 0.9rem; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #555;
    }
    .status-dot.connected { background: #4ade80; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: #e94560;
      color: white;
    }
    .message.assistant {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
    }
    .message.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 0.85rem;
    }
    .message .tool-info {
      margin-top: 0.5rem;
      padding: 0.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    #input-area {
      padding: 1rem 2rem;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 1rem;
    }
    #input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      resize: none;
      min-height: 48px;
      max-height: 120px;
    }
    #input:focus { outline: none; border-color: #e94560; }
    #send {
      padding: 0.75rem 1.5rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    #send:hover { background: #d63851; }
    #send:disabled { background: #555; cursor: not-allowed; }
    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 0.75rem 1rem;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      color: #888;
    }
    .typing-indicator.show { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>🌊 归藏</h1>
    <span class="subtitle">万物归藏，一念即达</span>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <div id="chat">
    <div class="message system">Welcome to 归藏 (Guicang) AI Assistant</div>
    <div class="typing-indicator" id="typing">Thinking...</div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const typing = document.getElementById('typing');

    let ws = null;
    let reconnectTimeout = null;

    function connect() {
      const port = window.location.port || '8081';
      ws = new WebSocket(`ws://${window.location.hostname}:${port}`);

      ws.onopen = () => {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
        addMessage('system', 'Connected to Guicang');
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        reconnectTimeout = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusText.textContent = 'Error';
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'welcome') {
          addMessage('system', msg.message);
        } else if (msg.type === 'processing') {
          typing.classList.add('show');
        } else if (msg.type === 'response') {
          typing.classList.remove('show');
          addMessage('assistant', msg.content, msg.toolCalls > 0 ? `Used ${msg.toolCalls} tool(s)` : null);
        } else if (msg.type === 'error') {
          typing.classList.remove('show');
          addMessage('system', `Error: ${msg.message}`);
        }
      };
    }

    function addMessage(role, content, toolInfo = null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;

      if (toolInfo) {
        const info = document.createElement('div');
        info.className = 'tool-info';
        info.textContent = toolInfo;
        div.appendChild(info);
      }

      chat.insertBefore(div, typing);
      chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'chat', message: text }));
      input.value = '';
      input.style.height = 'auto';
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    connect();
  </script>
</body>
</html>
