<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赤壁之战 - 3D 俯瞰演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: #000;
            overflow: hidden;
            color: #fff;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 100, 0, 0.8), 0 4px 8px rgba(0,0,0,0.8);
            letter-spacing: 12px;
            background: linear-gradient(180deg, #ffd700, #ff6b35, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #subtitle {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ccc;
            letter-spacing: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 150, 50, 0.4);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        #phase-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #phase-title::before {
            content: '⚔';
            font-size: 24px;
        }

        #phase-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #ddd;
        }

        #timeline {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 300px;
            pointer-events: auto;
        }

        #progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff4500);
            width: 0%;
            transition: width 0.3s;
            border-radius: 3px;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 150, 50, 0.2);
            border: 1px solid rgba(255, 150, 50, 0.5);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(255, 150, 50, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 150, 50, 0.3);
        }

        .btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: #fff;
        }

        #legend {
            position: absolute;
            top: 120px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 150, 50, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-size: 13px;
            pointer-events: auto;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }

        #wind-indicator {
            position: absolute;
            top: 120px;
            left: 30px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 150, 50, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            pointer-events: auto;
        }

        #wind-indicator h4 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #wind-arrow {
            font-size: 40px;
            color: #00bfff;
            transition: transform 1s ease;
        }

        #wind-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        #loading h1 {
            font-size: 48px;
            background: linear-gradient(180deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .loader {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff4500);
            width: 0%;
            animation: load 2s ease forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            font-size: 14px;
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>赤壁之战</h1>
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="ui-overlay">
        <div id="title">赤壁之战</div>
        <div id="subtitle">建安十三年 · 公元208年冬</div>

        <div id="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #ff4444;"></div>
                <span>曹操军 (北)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4488ff;"></div>
                <span>孙刘联军 (南)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff8800;"></div>
                <span>火船 / 火势</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #00ddff;"></div>
                <span>东南风</span>
            </div>
        </div>

        <div id="wind-indicator">
            <h4>风向</h4>
            <div id="wind-arrow">➤</div>
            <div id="wind-text">西北风</div>
        </div>

        <div id="info-panel">
            <div id="phase-title">历史背景</div>
            <div id="phase-desc">
                公元208年，曹操率八十万大军南下，意图统一天下。
                孙权与刘备结盟，在长江赤壁一带与曹军对峙。
                <br><br>
                <em style="color: #ffd700;">点击"开始演示"观看战役全过程</em>
            </div>
        </div>

        <div id="timeline">
            <div id="progress-bar">
                <div id="progress"></div>
            </div>
            <div id="controls">
                <button class="btn" id="btn-reset" onclick="resetAnimation()">重置</button>
                <button class="btn" id="btn-play" onclick="togglePlay()">▶ 开始演示</button>
                <button class="btn" id="btn-speed" onclick="toggleSpeed()">1x 速度</button>
            </div>
        </div>

        <div id="instructions">鼠标拖动旋转 · 滚轮缩放 · 右键平移</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============================================
        // 赤壁之战 3D 演示 - 核心代码
        // ============================================

        let scene, camera, renderer, controls;
        let water, landNorth, landSouth;
        let caoShips = [], sunShips = [];
        let fireShips = [], fireParticles = [];
        let windParticles = [], windDirection = 1;
        let smokeParticles = [];
        let routeLines = {};
        let animationPhase = 0;
        let isPlaying = false;
        let animationTime = 0;
        let animationSpeed = 1;
        let clock = new THREE.Clock();

        // 颜色定义
        const COLORS = {
            cao: 0xff4444,
            sun: 0x4488ff,
            fire: 0xff6600,
            water: 0x1a4a6a,
            waterDeep: 0x0a2a4a,
            land: 0x3a5a2a,
            landNorth: 0x4a4a3a,
            sand: 0x8a7a5a,
            smoke: 0x333333
        };

        // 初始化场景
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a3a);
            scene.fog = new THREE.FogExp2(0x1a2a3a, 0.008);

            // 相机
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 800, 600);
            camera.lookAt(0, 0, 0);

            // 渲染器
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // 灯光
            setupLights();

            // 创建地形
            createTerrain();

            // 创建长江
            createYangtzeRiver();

            // 创建船只
            createShips();

            // 创建风粒子
            createWindParticles();

            // 创建路线
            createRouteLines();

            // 控制器
            setupControls();

            // 事件监听
            window.addEventListener('resize', onWindowResize);

            // 隐藏加载界面
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 1000);
            }, 2500);

            // 开始渲染循环
            animate();
        }

        function setupLights() {
            // 环境光
            const ambient = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambient);

            // 主光源 (月光)
            const moonLight = new THREE.DirectionalLight(0x6688cc, 1.0);
            moonLight.position.set(-200, 400, -200);
            moonLight.castShadow = true;
            moonLight.shadow.mapSize.width = 2048;
            moonLight.shadow.mapSize.height = 2048;
            moonLight.shadow.camera.near = 10;
            moonLight.shadow.camera.far = 1500;
            moonLight.shadow.camera.left = -800;
            moonLight.shadow.camera.right = 800;
            moonLight.shadow.camera.top = 800;
            moonLight.shadow.camera.bottom = -800;
            scene.add(moonLight);

            // 补光
            const fillLight = new THREE.DirectionalLight(0x884422, 0.3);
            fillLight.position.set(200, 200, 200);
            scene.add(fillLight);
        }

        function createTerrain() {
            // 北岸 - 曹操阵地 (上方)
            const northGeo = new THREE.PlaneGeometry(2000, 400, 64, 32);
            const northMat = new THREE.MeshStandardMaterial({
                color: COLORS.landNorth,
                roughness: 0.9,
                metalness: 0.1
            });
            
            // 北岸地形起伏
            const northVerts = northGeo.attributes.position;
            for (let i = 0; i < northVerts.count; i++) {
                const x = northVerts.getX(i);
                const y = northVerts.getY(i);
                const z = 15 + Math.sin(x * 0.01) * 20 + Math.cos(y * 0.02) * 15 + Math.random() * 5;
                northVerts.setZ(i, z);
            }
            northGeo.computeVertexNormals();
            
            landNorth = new THREE.Mesh(northGeo, northMat);
            landNorth.position.set(0, 0, -450);
            landNorth.rotation.x = -Math.PI / 2;
            landNorth.receiveShadow = true;
            scene.add(landNorth);

            // 南岸 - 孙刘联军阵地 (下方)
            const southGeo = new THREE.PlaneGeometry(2000, 350, 64, 32);
            const southMat = new THREE.MeshStandardMaterial({
                color: COLORS.land,
                roughness: 0.85,
                metalness: 0.1
            });
            
            const southVerts = southGeo.attributes.position;
            for (let i = 0; i < southVerts.count; i++) {
                const x = southVerts.getX(i);
                const y = southVerts.getY(i);
                const z = 10 + Math.sin(x * 0.015) * 25 + Math.cos(y * 0.018) * 20 + Math.random() * 4;
                southVerts.setZ(i, z);
            }
            southGeo.computeVertexNormals();
            
            landSouth = new THREE.Mesh(southGeo, southMat);
            landSouth.position.set(0, 0, 400);
            landSouth.rotation.x = -Math.PI / 2;
            landSouth.receiveShadow = true;
            scene.add(landSouth);

            // 赤壁悬崖
            createCliff(-300, -250, 0xff4444, '赤壁');
            createCliff(300, -250, 0x888888, '乌林');

            // 远景山脉
            createDistantMountains();
        }

        function createCliff(x, z, color, name) {
            const cliffGeo = new THREE.ConeGeometry(60, 100, 6);
            const cliffMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.7,
                metalness: 0.2
            });
            const cliff = new THREE.Mesh(cliffGeo, cliffMat);
            cliff.position.set(x, 50, z);
            cliff.castShadow = true;
            scene.add(cliff);
        }

        function createDistantMountains() {
            const mountainPositions = [
                { x: -800, z: -700, s: 1.5 },
                { x: -500, z: -750, s: 1.2 },
                { x: 0, z: -800, s: 1.8 },
                { x: 500, z: -700, s: 1.3 },
                { x: 800, z: -750, s: 1.6 },
                { x: -700, z: 650, s: 1.4 },
                { x: -300, z: 700, s: 1.1 },
                { x: 300, z: 650, s: 1.5 },
                { x: 700, z: 700, s: 1.2 }
            ];

            mountainPositions.forEach(pos => {
                const geo = new THREE.ConeGeometry(80 * pos.s, 150 * pos.s, 5);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x2a3a2a,
                    roughness: 0.95
                });
                const mountain = new THREE.Mesh(geo, mat);
                mountain.position.set(pos.x, 60 * pos.s, pos.z);
                scene.add(mountain);
            });
        }

        function createYangtzeRiver() {
            // 河道形状
            const riverShape = new THREE.Shape();
            riverShape.moveTo(-1000, -120);
            riverShape.quadraticCurveTo(-500, -100, 0, -110);
            riverShape.quadraticCurveTo(500, -120, 1000, -100);
            riverShape.lineTo(1000, 120);
            riverShape.quadraticCurveTo(500, 100, 0, 110);
            riverShape.quadraticCurveTo(-500, 120, -1000, 100);
            riverShape.lineTo(-1000, -120);

            const riverGeo = new THREE.ShapeGeometry(riverShape, 100);
            const riverMat = new THREE.MeshStandardMaterial({
                color: COLORS.water,
                roughness: 0.3,
                metalness: 0.6,
                transparent: true,
                opacity: 0.9
            });

            water = new THREE.Mesh(riverGeo, riverMat);
            water.rotation.x = -Math.PI / 2;
            water.position.y = -2;
            scene.add(water);

            // 水面波纹效果
            createWaterRipples();

            // 河岸线
            createRiverBanks();
        }

        function createWaterRipples() {
            for (let i = 0; i < 50; i++) {
                const rippleGeo = new THREE.RingGeometry(2, 3, 32);
                const rippleMat = new THREE.MeshBasicMaterial({
                    color: 0x4488aa,
                    transparent: true,
                    opacity: 0.3,
                    side: THREE.DoubleSide
                });
                const ripple = new THREE.Mesh(rippleGeo, rippleMat);
                ripple.position.set(
                    (Math.random() - 0.5) * 1500,
                    0,
                    (Math.random() - 0.5) * 200
                );
                ripple.rotation.x = -Math.PI / 2;
                ripple.userData.phase = Math.random() * Math.PI * 2;
                ripple.userData.speed = 0.5 + Math.random() * 0.5;
                scene.add(ripple);
            }
        }

        function createRiverBanks() {
            // 北岸线
            const bankNorthGeo = new THREE.PlaneGeometry(2000, 15, 100);
            const bankNorthMat = new THREE.MeshStandardMaterial({
                color: COLORS.sand,
                roughness: 0.9
            });
            const bankNorth = new THREE.Mesh(bankNorthGeo, bankNorthMat);
            bankNorth.rotation.x = -Math.PI / 2;
            bankNorth.position.set(0, -1, -120);
            scene.add(bankNorth);

            // 南岸线
            const bankSouth = bankNorth.clone();
            bankSouth.position.set(0, -1, 120);
            scene.add(bankSouth);
        }

        function createShip(x, z, size, color, isFire = false) {
            const group = new THREE.Group();

            // 船身
            const bodyGeo = new THREE.BoxGeometry(40 * size, 8 * size, 15 * size);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x4a3520,
                roughness: 0.8
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            group.add(body);

            // 船首
            const bowGeo = new THREE.ConeGeometry(8 * size, 20 * size, 4);
            const bow = new THREE.Mesh(bowGeo, bodyMat);
            bow.rotation.z = Math.PI / 2;
            bow.position.x = 30 * size;
            group.add(bow);

            // 桅杆
            const mastGeo = new THREE.CylinderGeometry(1 * size, 1.5 * size, 40 * size);
            const mastMat = new THREE.MeshStandardMaterial({ color: 0x5a4a30 });
            const mast = new THREE.Mesh(mastGeo, mastMat);
            mast.position.y = 20 * size;
            group.add(mast);

            // 帆
            const sailGeo = new THREE.PlaneGeometry(25 * size, 30 * size);
            const sailMat = new THREE.MeshStandardMaterial({
                color: color,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.9
            });
            const sail = new THREE.Mesh(sailGeo, sailMat);
            sail.position.set(0, 25 * size, 5 * size);
            group.add(sail);

            // 火盆 (如果是火船)
            if (isFire) {
                const fireBowlGeo = new THREE.CylinderGeometry(4 * size, 3 * size, 5 * size);
                const fireBowlMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const fireBowl = new THREE.Mesh(fireBowlGeo, fireBowlMat);
                fireBowl.position.y = 8 * size;
                group.add(fireBowl);
            }

            group.position.set(x, 0, z);
            group.userData = {
                originalX: x,
                originalZ: z,
                speed: 0.5 + Math.random() * 0.3,
                bobPhase: Math.random() * Math.PI * 2,
                size: size,
                isFire: isFire
            };

            scene.add(group);
            return group;
        }

        function createShips() {
            // 曹操连环船阵 (北岸，密集排列)
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 12; col++) {
                    const x = -240 + col * 45;
                    const z = -100 + row * 30;
                    const ship = createShip(x, z, 0.8 + Math.random() * 0.3, COLORS.cao);
                    caoShips.push(ship);
                }
            }

            // 孙刘联军 (南岸，分散)
            for (let i = 0; i < 15; i++) {
                const x = -150 + i * 25 + Math.random() * 10;
                const z = 80 + Math.random() * 30;
                const ship = createShip(x, z, 0.6 + Math.random() * 0.2, COLORS.sun);
                sunShips.push(ship);
            }

            // 黄盖火船 (初始隐藏)
            for (let i = 0; i < 5; i++) {
                const ship = createShip(-100 + i * 50, 100, 0.7, COLORS.fire, true);
                ship.visible = false;
                fireShips.push(ship);
            }
        }

        function createWindParticles() {
            const particleCount = 500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 1200;
                positions[i * 3 + 1] = 20 + Math.random() * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 400;

                velocities[i * 3] = 2 + Math.random() * 2;
                velocities[i * 3 + 1] = 0;
                velocities[i * 3 + 2] = 1 + Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.userData.velocities = velocities;

            const material = new THREE.PointsMaterial({
                color: 0x00ddff,
                size: 3,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            windParticles.push(particles);
        }

        function createFireParticles(ship) {
            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = ship.position.x + (Math.random() - 0.5) * 30;
                positions[i * 3 + 1] = 20 + Math.random() * 60;
                positions[i * 3 + 2] = ship.position.z + (Math.random() - 0.5) * 20;

                // 火焰颜色渐变
                colors[i * 3] = 1;
                colors[i * 3 + 1] = 0.3 + Math.random() * 0.4;
                colors[i * 3 + 2] = Math.random() * 0.2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 8,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            fireParticles.push({ mesh: particles, ship: ship });
        }

        function createSmokeParticle(x, z) {
            const smokeGeo = new THREE.SphereGeometry(5 + Math.random() * 10);
            const smokeMat = new THREE.MeshBasicMaterial({
                color: 0x333333,
                transparent: true,
                opacity: 0.6
            });
            const smoke = new THREE.Mesh(smokeGeo, smokeMat);
            smoke.position.set(x, 30 + Math.random() * 50, z);
            smoke.userData.velocity = new THREE.Vector3(
                1 + Math.random() * 2,
                1 + Math.random(),
                0.5 + Math.random() * 0.5
            );
            smoke.userData.life = 1;
            scene.add(smoke);
            smokeParticles.push(smoke);
        }

        function createRouteLines() {
            // 曹操进军路线
            const caoRouteGeo = new THREE.BufferGeometry();
            const caoRoutePoints = [
                new THREE.Vector3(0, 5, -600),
                new THREE.Vector3(0, 5, -500),
                new THREE.Vector3(-100, 5, -350),
                new THREE.Vector3(-50, 5, -200),
                new THREE.Vector3(0, 5, -130)
            ];
            caoRouteGeo.setFromPoints(caoRoutePoints);
            const caoRouteMat = new THREE.LineBasicMaterial({
                color: COLORS.cao,
                linewidth: 3,
                transparent: true,
                opacity: 0.8
            });
            routeLines.cao = new THREE.Line(caoRouteGeo, caoRouteMat);
            routeLines.cao.visible = false;
            scene.add(routeLines.cao);

            // 孙刘联军路线
            const sunRouteGeo = new THREE.BufferGeometry();
            const sunRoutePoints = [
                new THREE.Vector3(-300, 5, 600),
                new THREE.Vector3(-200, 5, 450),
                new THREE.Vector3(-100, 5, 300),
                new THREE.Vector3(0, 5, 180),
                new THREE.Vector3(0, 5, 120)
            ];
            sunRouteGeo.setFromPoints(sunRoutePoints);
            const sunRouteMat = new THREE.LineBasicMaterial({
                color: COLORS.sun,
                linewidth: 3,
                transparent: true,
                opacity: 0.8
            });
            routeLines.sun = new THREE.Line(sunRouteGeo, sunRouteMat);
            routeLines.sun.visible = false;
            scene.add(routeLines.sun);

            // 黄盖诈降路线
            const huangRouteGeo = new THREE.BufferGeometry();
            const huangRoutePoints = [
                new THREE.Vector3(0, 5, 120),
                new THREE.Vector3(-50, 5, 80),
                new THREE.Vector3(-80, 5, 20),
                new THREE.Vector3(-60, 5, -30),
                new THREE.Vector3(-30, 5, -80)
            ];
            huangRouteGeo.setFromPoints(huangRoutePoints);
            const huangRouteMat = new THREE.LineBasicMaterial({
                color: 0xffaa00,
                linewidth: 3,
                transparent: true,
                opacity: 0.8
            });
            routeLines.huang = new THREE.Line(huangRouteGeo, huangRouteMat);
            routeLines.huang.visible = false;
            scene.add(routeLines.huang);

            // 曹操败走路线
            const retreatGeo = new THREE.BufferGeometry();
            const retreatPoints = [
                new THREE.Vector3(0, 5, -100),
                new THREE.Vector3(100, 5, -200),
                new THREE.Vector3(200, 5, -350),
                new THREE.Vector3(350, 5, -500),
                new THREE.Vector3(500, 5, -650)
            ];
            retreatGeo.setFromPoints(retreatPoints);
            const retreatMat = new THREE.LineBasicMaterial({
                color: 0x880000,
                linewidth: 2,
                transparent: true,
                opacity: 0.6
            });
            routeLines.retreat = new THREE.Line(retreatGeo, retreatMat);
            routeLines.retreat.visible = false;
            scene.add(routeLines.retreat);
        }

        function setupControls() {
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let cameraDistance = 1000;
            let cameraAngleX = 0.5;
            let cameraAngleY = 0.8;
            let cameraTarget = new THREE.Vector3(0, 0, 0);

            const canvas = document.getElementById('canvas');

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                cameraAngleX += deltaX * 0.005;
                cameraAngleY = Math.max(0.2, Math.min(1.5, cameraAngleY - deltaY * 0.005));

                previousMousePosition = { x: e.clientX, y: e.clientY };
                updateCameraPosition();
            });

            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('mouseleave', () => isDragging = false);

            canvas.addEventListener('wheel', (e) => {
                cameraDistance = Math.max(300, Math.min(2000, cameraDistance + e.deltaY));
                updateCameraPosition();
            });

            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            function updateCameraPosition() {
                camera.position.x = cameraTarget.x + cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
                camera.position.y = cameraTarget.y + cameraDistance * Math.sin(cameraAngleY);
                camera.position.z = cameraTarget.z + cameraDistance * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
                camera.lookAt(cameraTarget);
            }

            updateCameraPosition();

            // 暴露控制方法
            window.moveCameraTo = function(x, y, z, lookAtX, lookAtY, lookAtZ, duration = 2000) {
                const startPos = camera.position.clone();
                const startTarget = new THREE.Vector3(
                    camera.position.x - (camera.position.x - camera.getWorldDirection(new THREE.Vector3()).x * 100),
                    0,
                    camera.position.z - (camera.position.z - camera.getWorldDirection(new THREE.Vector3()).z * 100)
                );
                const endPos = new THREE.Vector3(x, y, z);
                const endTarget = new THREE.Vector3(lookAtX, lookAtY, lookAtZ);
                const startTime = Date.now();

                function animateCamera() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(1, elapsed / duration);
                    const eased = 1 - Math.pow(1 - progress, 3);

                    camera.position.lerpVectors(startPos, endPos, eased);
                    cameraTarget.lerpVectors(startTarget, endTarget, eased);
                    camera.lookAt(cameraTarget);

                    if (progress < 1) {
                        requestAnimationFrame(animateCamera);
                    }
                }
                animateCamera();
            };
        }

        // ============================================
        // 动画阶段
        // ============================================

        const phases = [
            {
                name: "历史背景",
                desc: "公元208年，曹操率八十万大军南下，意图统一天下。孙权与刘备结盟，在长江赤壁一带与曹军对峙。",
                action: () => {
                    routeLines.cao.visible = false;
                    routeLines.sun.visible = false;
                    window.moveCameraTo(0, 800, 600, 0, 0, 0, 2000);
                }
            },
            {
                name: "两军对峙",
                desc: "曹操军队驻扎北岸乌林，孙刘联军驻守南岸赤壁。两军隔江对峙，战事一触即发。",
                action: () => {
                    routeLines.cao.visible = true;
                    routeLines.sun.visible = true;
                    window.moveCameraTo(0, 600, 500, 0, 0, 0, 2000);
                    updateWindIndicator('西北风', 180);
                }
            },
            {
                name: "连环船阵",
                desc: "曹操采纳庞统献策，将战船首尾相连，以铁索锁之，便于北方士兵在船上行走作战。",
                action: () => {
                    // 船只靠近连接
                    caoShips.forEach((ship, i) => {
                        const targetZ = -90 + Math.floor(i / 12) * 25;
                        animateObject(ship, { z: targetZ }, 1500);
                    });
                    window.moveCameraTo(-100, 300, 50, -100, 0, -80, 2000);
                }
            },
            {
                name: "黄盖诈降",
                desc: "东吴老将黄盖向曹操献书诈降，约定日期率船来降。曹操信以为真，放松警惕。",
                action: () => {
                    routeLines.huang.visible = true;
                    fireShips.forEach((ship, i) => {
                        ship.visible = true;
                        ship.position.set(-150 + i * 50, 0, 100);
                    });
                    window.moveCameraTo(-50, 400, 200, -50, 0, 0, 2000);
                }
            },
            {
                name: "东南风起",
                desc: "隆冬时节，忽然东南风大作！这是极为罕见的天象，为火攻创造了绝佳条件。",
                action: () => {
                    windDirection = -1;
                    updateWindIndicator('东南风', 0);
                    document.getElementById('wind-text').style.color = '#00ffff';
                    window.moveCameraTo(0, 500, 0, 0, 0, 0, 2000);
                }
            },
            {
                name: "火船突入",
                desc: "黄盖率领装满薪草膏油的火船，借东南风之势，直冲曹军水寨！",
                action: () => {
                    fireShips.forEach((ship, i) => {
                        setTimeout(() => {
                            animateObject(ship, { z: -60 - i * 5 }, 2000);
                            createFireParticles(ship);
                        }, i * 300);
                    });
                    window.moveCameraTo(-50, 350, 50, -50, 0, -50, 2000);
                }
            },
            {
                name: "火烧连营",
                desc: "火船撞入曹军船阵，火势借东南风迅速蔓延！铁索连环的战船无法分开，整个水寨化为一片火海。",
                action: () => {
                    // 点燃曹操船队
                    caoShips.forEach((ship, i) => {
                        setTimeout(() => {
                            createFireParticles(ship);
                            ship.material = new THREE.MeshStandardMaterial({ color: 0x331100 });
                        }, i * 100);
                    });
                    // 生成烟雾
                    const smokeInterval = setInterval(() => {
                        for (let i = 0; i < 5; i++) {
                            createSmokeParticle(
                                -200 + Math.random() * 400,
                                -100 + Math.random() * 80
                            );
                        }
                    }, 200);
                    setTimeout(() => clearInterval(smokeInterval), 5000);
                    
                    window.moveCameraTo(0, 400, 100, 0, 0, -50, 2500);
                }
            },
            {
                name: "曹军大败",
                desc: "曹军水寨被焚，士兵死伤无数。曹操弃船登岸，率残部从华容道仓皇北逃。",
                action: () => {
                    routeLines.retreat.visible = true;
                    // 曹船散开并向北移动
                    caoShips.forEach((ship, i) => {
                        animateObject(ship, {
                            x: ship.position.x + (Math.random() - 0.5) * 100,
                            z: ship.position.z - 100 - Math.random() * 100
                        }, 3000);
                    });
                    window.moveCameraTo(200, 600, -100, 300, 0, -400, 3000);
                }
            },
            {
                name: "战役尾声",
                desc: "赤壁之战大败曹操，奠定了三国鼎立的基础。此役以少胜多，成为千古传颂的经典战役。",
                action: () => {
                    window.moveCameraTo(0, 1000, 800, 0, 0, 0, 3000);
                    updateWindIndicator('风止', 0);
                }
            }
        ];

        function updateWindIndicator(text, rotation) {
            const arrow = document.getElementById('wind-arrow');
            const textEl = document.getElementById('wind-text');
            arrow.style.transform = `rotate(${rotation}deg)`;
            textEl.textContent = text;
            if (text === '东南风') {
                arrow.style.color = '#00ffff';
                textEl.style.color = '#00ffff';
            } else if (text === '风止') {
                arrow.style.color = '#666';
                textEl.style.color = '#666';
            } else {
                arrow.style.color = '#00bfff';
                textEl.style.color = '#aaa';
            }
        }

        function animateObject(obj, target, duration) {
            const start = {
                x: obj.position.x,
                y: obj.position.y,
                z: obj.position.z
            };
            const startTime = Date.now();

            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(1, elapsed / duration);
                const eased = 1 - Math.pow(1 - progress, 3);

                if (target.x !== undefined) obj.position.x = start.x + (target.x - start.x) * eased;
                if (target.y !== undefined) obj.position.y = start.y + (target.y - start.y) * eased;
                if (target.z !== undefined) obj.position.z = start.z + (target.z - start.z) * eased;

                if (progress < 1) requestAnimationFrame(update);
            }
            update();
        }

        // ============================================
        // 动画控制
        // ============================================

        let phaseTimer = null;

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btn-play');
            
            if (isPlaying) {
                btn.textContent = '⏸ 暂停';
                btn.classList.add('active');
                if (animationPhase >= phases.length) {
                    animationPhase = 0;
                }
                playPhase();
            } else {
                btn.textContent = '▶ 继续';
                btn.classList.remove('active');
                if (phaseTimer) clearTimeout(phaseTimer);
            }
        }

        function playPhase() {
            if (!isPlaying || animationPhase >= phases.length) {
                isPlaying = false;
                document.getElementById('btn-play').textContent = '▶ 重新开始';
                document.getElementById('btn-play').classList.remove('active');
                return;
            }

            const phase = phases[animationPhase];
            document.getElementById('phase-title').textContent = phase.name;
            document.getElementById('phase-desc').innerHTML = phase.desc;
            document.getElementById('progress').style.width = 
                ((animationPhase + 1) / phases.length * 100) + '%';

            phase.action();
            animationPhase++;

            const delay = (4000 / animationSpeed);
            phaseTimer = setTimeout(() => playPhase(), delay);
        }

        function resetAnimation() {
            isPlaying = false;
            animationPhase = 0;
            if (phaseTimer) clearTimeout(phaseTimer);

            document.getElementById('btn-play').textContent = '▶ 开始演示';
            document.getElementById('btn-play').classList.remove('active');
            document.getElementById('progress').style.width = '0%';
            document.getElementById('phase-title').textContent = '历史背景';
            document.getElementById('phase-desc').innerHTML = 
                '公元208年，曹操率八十万大军南下，意图统一天下。<br>孙权与刘备结盟，在长江赤壁一带与曹军对峙。<br><br><em style="color: #ffd700;">点击"开始演示"观看战役全过程</em>';

            // 重置场景
            routeLines.cao.visible = false;
            routeLines.sun.visible = false;
            routeLines.huang.visible = false;
            routeLines.retreat.visible = false;

            // 清除火和烟
            fireParticles.forEach(fp => scene.remove(fp.mesh));
            fireParticles = [];
            smokeParticles.forEach(s => scene.remove(s));
            smokeParticles = [];

            // 重置火船
            fireShips.forEach(ship => {
                ship.visible = false;
                ship.position.z = 100;
            });

            window.moveCameraTo(0, 800, 600, 0, 0, 0, 2000);
            updateWindIndicator('西北风', 180);
        }

        function toggleSpeed() {
            const speeds = [1, 1.5, 2, 0.5];
            const labels = ['1x 速度', '1.5x 速度', '2x 速度', '0.5x 速度'];
            const currentIndex = speeds.indexOf(animationSpeed);
            const nextIndex = (currentIndex + 1) % speeds.length;
            animationSpeed = speeds[nextIndex];
            document.getElementById('btn-speed').textContent = labels[nextIndex];
        }

        // ============================================
        // 渲染循环
        // ============================================

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 水面动画
            if (water) {
                water.material.opacity = 0.85 + Math.sin(time * 2) * 0.05;
            }

            // 船只晃动
            [...caoShips, ...sunShips, ...fireShips].forEach(ship => {
                if (ship.visible) {
                    ship.position.y = Math.sin(time * 2 + ship.userData.bobPhase) * 2;
                    ship.rotation.z = Math.sin(time * 1.5 + ship.userData.bobPhase) * 0.02;
                }
            });

            // 风粒子动画
            windParticles.forEach(particles => {
                const positions = particles.geometry.attributes.position.array;
                const velocities = particles.geometry.userData.velocities;
                
                for (let i = 0; i < positions.length / 3; i++) {
                    positions[i * 3] += velocities[i * 3] * windDirection;
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3 + 2] += velocities[i * 3 + 2] * windDirection;

                    // 重置超出边界的粒子
                    if (Math.abs(positions[i * 3]) > 600) {
                        positions[i * 3] = -600 * windDirection;
                        positions[i * 3 + 1] = 20 + Math.random() * 100;
                        positions[i * 3 + 2] = (Math.random() - 0.5) * 400;
                    }
                }
                particles.geometry.attributes.position.needsUpdate = true;
            });

            // 火焰粒子动画
            fireParticles.forEach(fp => {
                const positions = fp.mesh.geometry.attributes.position.array;
                const shipPos = fp.ship.position;
                
                for (let i = 0; i < positions.length / 3; i++) {
                    positions[i * 3] += (Math.random() - 0.5) * 2;
                    positions[i * 3 + 1] += 1 + Math.random() * 2;
                    positions[i * 3 + 2] += windDirection * 0.5;

                    if (positions[i * 3 + 1] > 100) {
                        positions[i * 3] = shipPos.x + (Math.random() - 0.5) * 30;
                        positions[i * 3 + 1] = 20;
                        positions[i * 3 + 2] = shipPos.z + (Math.random() - 0.5) * 20;
                    }
                }
                fp.mesh.geometry.attributes.position.needsUpdate = true;
            });

            // 烟雾动画
            smokeParticles.forEach((smoke, index) => {
                smoke.position.add(smoke.userData.velocity.clone().multiplyScalar(delta * 10));
                smoke.userData.life -= delta * 0.3;
                smoke.material.opacity = smoke.userData.life * 0.5;
                smoke.scale.multiplyScalar(1 + delta * 0.5);

                if (smoke.userData.life <= 0) {
                    scene.remove(smoke);
                    smokeParticles.splice(index, 1);
                }
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 初始化
        init();
    </script>
