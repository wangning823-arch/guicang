<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归藏 — 工作流编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-header h1 { font-size: 18px; color: #00d4ff; }
    .sidebar-section { padding: 12px 16px; }
    .sidebar-section h3 { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }

    .node-palette {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .palette-item {
      background: #334155;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      text-align: center;
      transition: all 0.2s;
      font-size: 12px;
    }
    .palette-item:hover {
      border-color: #00d4ff;
      background: #1e3a5f;
    }
    .palette-item .icon { font-size: 20px; margin-bottom: 4px; }

    /* Workflow list */
    .workflow-list { flex: 1; overflow-y: auto; padding: 8px; }
    .workflow-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .workflow-item:hover { background: #334155; }
    .workflow-item.active { background: #1e3a5f; border-left: 3px solid #00d4ff; }
    .workflow-item .name { font-size: 14px; }
    .workflow-item .actions { display: flex; gap: 8px; }
    .workflow-item .actions button {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
    }
    .workflow-item .actions button:hover { color: #e2e8f0; }

    /* Canvas */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .canvas {
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Nodes */
    .wf-node {
      position: absolute;
      background: #1e293b;
      border: 2px solid #475569;
      border-radius: 10px;
      min-width: 140px;
      cursor: move;
      user-select: none;
      transition: border-color 0.2s;
    }
    .wf-node:hover { border-color: #00d4ff; }
    .wf-node.selected { border-color: #00d4ff; box-shadow: 0 0 12px #00d4ff40; }
    .wf-node .header {
      padding: 8px 12px;
      border-bottom: 1px solid #334155;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .wf-node .body {
      padding: 10px 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .wf-node .port {
      width: 10px;
      height: 10px;
      background: #475569;
      border: 2px solid #1e293b;
      border-radius: 50%;
      position: absolute;
      cursor: crosshair;
    }
    .wf-node .port.input { top: 50%; left: -5px; transform: translateY(-50%); }
    .wf-node .port.output { top: 50%; right: -5px; transform: translateY(-50%); }
    .wf-node .port:hover { background: #00d4ff; }

    /* Connection lines */
    .connections-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .connections-svg path {
      fill: none;
      stroke: #475569;
      stroke-width: 2;
    }
    .connections-svg path.active { stroke: #00d4ff; }

    /* Toolbar */
    .toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .toolbar button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .toolbar button:hover { background: #334155; border-color: #00d4ff; }
    .toolbar button.primary { background: #00d4ff; color: #0f172a; border-color: #00d4ff; }
    .toolbar button.primary:hover { background: #00b8d4; }
    .toolbar button.danger { border-color: #ef4444; color: #ef4444; }
    .toolbar button.danger:hover { background: #ef444420; }

    /* Properties panel */
    .properties {
      width: 280px;
      background: #1e293b;
      border-left: 1px solid #334155;
      padding: 16px;
      display: none;
    }
    .properties.visible { display: block; }
    .properties h3 { font-size: 14px; margin-bottom: 12px; color: #00d4ff; }
    .properties label {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .properties input, .properties select, .properties textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    .properties textarea { min-height: 60px; resize: vertical; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-size:24px">🔮</span>
        <h1>归藏</h1>
      </div>

      <div class="sidebar-section">
        <h3>节点面板</h3>
        <div class="node-palette">
          <div class="palette-item" draggable="true" data-type="start">
            <div class="icon">▶️</div>
            开始
          </div>
          <div class="palette-item" draggable="true" data-type="end">
            <div class="icon">⏹️</div>
            结束
          </div>
          <div class="palette-item" draggable="true" data-type="llm">
            <div class="icon">🤖</div>
            LLM
          </div>
          <div class="palette-item" draggable="true" data-type="tool">
            <div class="icon">🔧</div>
            工具
          </div>
          <div class="palette-item" draggable="true" data-type="condition">
            <div class="icon">❓</div>
            条件
          </div>
          <div class="palette-item" draggable="true" data-type="parallel">
            <div class="icon">⚡</div>
            并行
          </div>
          <div class="palette-item" draggable="true" data-type="transform">
            <div class="icon">🔄</div>
            转换
          </div>
          <div class="palette-item" draggable="true" data-type="delay">
            <div class="icon">⏱️</div>
            延迟
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>工作流列表</h3>
      </div>
      <div class="workflow-list" id="workflowList"></div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
      <svg class="connections-svg" id="connectionsSvg"></svg>
      <div class="canvas" id="canvas"></div>

      <div class="toolbar">
        <button class="primary" onclick="saveWorkflow()">💾 保存</button>
        <button onclick="runWorkflow()">▶️ 运行</button>
        <button onclick="clearCanvas()">🗑️ 清空</button>
        <button class="danger" onclick="deleteWorkflow()">❌ 删除</button>
      </div>
    </div>

    <!-- Properties -->
    <div class="properties" id="propertiesPanel">
      <h3>节点属性</h3>
      <label>名称</label>
      <input id="propName" placeholder="Node name" />
      <label>类型</label>
      <input id="propType" readonly />
      <label>描述</label>
      <textarea id="propDesc" placeholder="Description"></textarea>
      <label>配置</label>
      <textarea id="propConfig" placeholder='{"key": "value"}'></textarea>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // State
    let nodes = [];
    let connections = [];
    let selectedNode = null;
    let draggingNode = null;
    let dragOffset = { x: 0, y: 0 };
    let connectingFrom = null;
    let ws = null;
    let currentWorkflow = null;

    // Node types
    const NODE_TYPES = {
      start: { label: '开始', icon: '▶️', color: '#10b981' },
      end: { label: '结束', icon: '⏹️', color: '#ef4444' },
      llm: { label: 'LLM', icon: '🤖', color: '#8b5cf6' },
      tool: { label: '工具', icon: '🔧', color: '#f59e0b' },
      condition: { label: '条件', icon: '❓', color: '#3b82f6' },
      parallel: { label: '并行', icon: '⚡', color: '#ec4899' },
      transform: { label: '转换', icon: '🔄', color: '#06b6d4' },
      delay: { label: '延迟', icon: '⏱️', color: '#64748b' },
    };

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // WebSocket
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.hostname}:8081`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'workflows') renderWorkflowList(data.workflows);
        if (data.type === 'saved') showToast('已保存');
        if (data.type === 'error') showToast('错误: ' + data.message);
      };
      ws.onopen = () => ws.send(JSON.stringify({ type: 'list_workflows' }));
    }

    // Render workflow list
    function renderWorkflowList(workflows) {
      const list = document.getElementById('workflowList');
      list.innerHTML = workflows.map(w => `
        <div class="workflow-item ${currentWorkflow?.id === w.id ? 'active' : ''}"
             onclick="loadWorkflow('${w.id}')">
          <span class="name">${w.name}</span>
          <span class="actions">
            <button onclick="event.stopPropagation(); runWorkflowById('${w.id}')">▶</button>
          </span>
        </div>
      `).join('');
    }

    // Load workflow
    function loadWorkflow(id) {
      ws.send(JSON.stringify({ type: 'load_workflow', id }));
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'workflow_data') {
          currentWorkflow = data.workflow;
          nodes = data.workflow.nodes || [];
          connections = data.workflow.connections || [];
          renderCanvas();
          renderWorkflowList(data.workflows || []);
          showToast('已加载: ' + data.workflow.name);
        }
      };
    }

    // Save workflow
    function saveWorkflow() {
      const name = prompt('工作流名称:', currentWorkflow?.name || 'workflow-' + Date.now());
      if (!name) return;
      ws.send(JSON.stringify({
        type: 'save_workflow',
        id: currentWorkflow?.id,
        name,
        nodes,
        connections,
      }));
    }

    // Run workflow
    function runWorkflow() {
      if (!currentWorkflow) { showToast('请先保存工作流'); return; }
      ws.send(JSON.stringify({ type: 'run_workflow', id: currentWorkflow.id }));
      showToast('运行中...');
    }

    function runWorkflowById(id) {
      ws.send(JSON.stringify({ type: 'run_workflow', id }));
      showToast('运行中...');
    }

    // Delete workflow
    function deleteWorkflow() {
      if (!currentWorkflow) return;
      if (!confirm('确定删除?')) return;
      ws.send(JSON.stringify({ type: 'delete_workflow', id: currentWorkflow.id }));
      currentWorkflow = null;
      nodes = [];
      connections = [];
      renderCanvas();
    }

    // Clear canvas
    function clearCanvas() {
      nodes = [];
      connections = [];
      renderCanvas();
    }

    // Create node
    function createNode(type, x, y) {
      const id = 'node-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      const node = {
        id,
        type,
        name: NODE_TYPES[type]?.label || type,
        x,
        y,
        config: {},
      };
      nodes.push(node);
      renderCanvas();
      return node;
    }

    // Render canvas
    function renderCanvas() {
      const canvas = document.getElementById('canvas');

      // Render nodes
      canvas.innerHTML = nodes.map(n => {
        const t = NODE_TYPES[n.type] || { label: n.type, icon: '📦', color: '#475569' };
        return `
          <div class="wf-node ${selectedNode?.id === n.id ? 'selected' : ''}"
               id="${n.id}"
               style="left: ${n.x}px; top: ${n.y}px; border-color: ${t.color}"
               onmousedown="startDrag(event, '${n.id}')"
               onclick="selectNode('${n.id}')">
            <div class="port input" onmousedown="startConnect(event, '${n.id}', 'input')"></div>
            <div class="port output" onmousedown="startConnect(event, '${n.id}', 'output')"></div>
            <div class="header" style="color: ${t.color}">
              ${t.icon} ${n.name}
            </div>
            <div class="body">${n.type}</div>
          </div>
        `;
      }).join('');

      // Render connections
      renderConnections();
    }

    // Render connections
    function renderConnections() {
      const svg = document.getElementById('connectionsSvg');
      const canvas = document.getElementById('canvasContainer');
      const rect = canvas.getBoundingClientRect();

      let paths = '';
      for (const conn of connections) {
        const fromEl = document.getElementById(conn.from);
        const toEl = document.getElementById(conn.to);
        if (!fromEl || !toEl) continue;

        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();

        const x1 = fromRect.right - rect.left;
        const y1 = fromRect.top + fromRect.height / 2 - rect.top;
        const x2 = toRect.left - rect.left;
        const y2 = toRect.top + toRect.height / 2 - rect.top;

        const cx = (x2 - x1) / 2;

        paths += `<path d="M ${x1} ${y1} C ${x1 + cx} ${y1}, ${x2 - cx} ${y2}, ${x2} ${y2}" class="active" />`;
      }
      svg.innerHTML = paths;
    }

    // Drag & Drop from palette
    document.querySelectorAll('.palette-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('nodeType', item.dataset.type);
      });
    });

    document.getElementById('canvas').addEventListener('dragover', (e) => e.preventDefault());
    document.getElementById('canvas').addEventListener('drop', (e) => {
      e.preventDefault();
      const type = e.dataTransfer.getData('nodeType');
      if (!type) return;
      const rect = e.currentTarget.getBoundingClientRect();
      createNode(type, e.clientX - rect.left - 70, e.clientY - rect.top - 30);
    });

    // Node dragging
    function startDrag(e, nodeId) {
      if (e.target.classList.contains('port')) return;
      draggingNode = nodeId;
      const node = nodes.find(n => n.id === nodeId);
      const rect = document.getElementById('canvasContainer').getBoundingClientRect();
      dragOffset = { x: e.clientX - rect.left - node.x, y: e.clientY - rect.top - node.y };
      e.preventDefault();
    }

    document.addEventListener('mousemove', (e) => {
      if (!draggingNode) return;
      const rect = document.getElementById('canvasContainer').getBoundingClientRect();
      const node = nodes.find(n => n.id === draggingNode);
      node.x = e.clientX - rect.left - dragOffset.x;
      node.y = e.clientY - rect.top - dragOffset.y;
      renderCanvas();
    });

    document.addEventListener('mouseup', () => { draggingNode = null; });

    // Connections
    function startConnect(e, nodeId, portType) {
      e.stopPropagation();
      if (portType === 'output') {
        connectingFrom = nodeId;
      } else if (connectingFrom && portType === 'input') {
        if (connectingFrom !== nodeId) {
          connections.push({ from: connectingFrom, to: nodeId });
          renderConnections();
        }
        connectingFrom = null;
      }
    }

    // Select node
    function selectNode(nodeId) {
      selectedNode = nodes.find(n => n.id === nodeId);
      const panel = document.getElementById('propertiesPanel');
      panel.classList.add('visible');
      document.getElementById('propName').value = selectedNode.name;
      document.getElementById('propType').value = selectedNode.type;
      document.getElementById('propDesc').value = selectedNode.description || '';
      document.getElementById('propConfig').value = JSON.stringify(selectedNode.config || {}, null, 2);
      renderCanvas();
    }

    // Update node properties
    document.getElementById('propName').addEventListener('input', (e) => {
      if (selectedNode) { selectedNode.name = e.target.value; renderCanvas(); }
    });
    document.getElementById('propDesc').addEventListener('input', (e) => {
      if (selectedNode) selectedNode.description = e.target.value;
    });
    document.getElementById('propConfig').addEventListener('input', (e) => {
      if (selectedNode) {
        try { selectedNode.config = JSON.parse(e.target.value); } catch {}
      }
    });

    // Init
    connectWS();
  </script>
</body>
</html>
